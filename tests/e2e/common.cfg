if [ -z "${WORKSPACE_ROOT}" ]; then
	echo "WORKSPACE_ROOT is not set. Exiting."
	exit 1
fi

PROJECT_ROOT=${WORKSPACE_ROOT}

ERROR_LOG=""

TEST() {
	TITLE=$1
	EXPECTED_STATUS=$2
	METHOD=$3
	ENDPOINT=$4
	shift 4

	local response=$(curl -s -w "%{http_code}" -X "${METHOD}" "${HOST}${ENDPOINT}" "$@")

	STATUS="${response:${#response}-3}" # Last 3
	BODY="${response:0:${#response}-3}" # Exclude last 3

	if [[ "${STATUS}" -ne "${EXPECTED_STATUS}" ]]; then
		message="\e[1;31m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
		ERROR_LOG="${ERROR_LOG}${TITLE}\n${message}\n$@\n\n"
	else
		message="\e[1;32m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
	fi

	echo -e ${message} >&2
	echo "${BODY}" | jq '.' >&2
	echo "" >&2
}

print_result() {
	if [[ -z "${ERROR_LOG}" ]]; then
		echo "Test Successful"
	else
		echo "List of Failed Tests:"
		echo ""
		echo -e "${ERROR_LOG}"
		exit 1
	fi
}

reset_all() {
	echo "🚀 Starting infra..."
	npm run infra:reset
	npm run apps:reset

	echo "Infra is running"
	echo ""

	# Check curl; exit if failed
	if ! CURL_OUTPUT=$(curl -sS "${HOST}" 2>&1); then
		echo "${CURL_OUTPUT}"
		exit 1
	fi
}

create_user_and_login() {
	TEST "Create a user" \
		201 POST /customers \
		-H 'Content-Type: application/json' \
		-d '{
                "name": "UserName#1",
                "email": "test@test.com",
                "birthDate": "1990-01-01T00:00:00.000Z",
                "password": "testpassword"
            }'

	USER_ID=$(echo ${BODY} | jq -r '.id')

	TEST "Login" \
		200 POST /customers/login \
		-H 'Content-Type: application/json' \
		-d '{ "email": "test@test.com", "password": "testpassword" }'

	ACCESS_TOKEN=$(echo ${BODY} | jq -r '.accessToken')
	REFRESH_TOKEN=$(echo ${BODY} | jq -r '.refreshToken')
}
