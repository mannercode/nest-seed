if [ -z "${WORKSPACE_ROOT}" ]; then
	echo "WORKSPACE_ROOT is not set. Exiting."
	exit 1
fi

PROJECT_ROOT=${WORKSPACE_ROOT}

FIXTURE_IMAGE_PATH="${PROJECT_ROOT}/src/apps/__tests__/__helpers__/fixture-files/image.file"
FIXTURE_IMAGE_NAME="image.png"
FIXTURE_IMAGE_SIZE=170550
FIXTURE_IMAGE_MIME="image/png"
FIXTURE_IMAGE_CHECKSUM="d5l1XdGa5zgerERd5V5xMR0X0mbMoZvJL1liTH1to2A="

DEFAULT_SHOWTIME_START="2099-01-01T10:00:00.000Z"
DEFAULT_SHOWDATE="20990101"

ERROR_LOG=""

TEST() {
	TITLE=$1
	EXPECTED_STATUS=$2
	METHOD=$3
	ENDPOINT=$4
	shift 4

	local response=$(curl -s -w "%{http_code}" -X "${METHOD}" "${HOST}${ENDPOINT}" "$@")

	STATUS="${response:${#response}-3}" # Last 3
	BODY="${response:0:${#response}-3}" # Exclude last 3

	if [[ "${STATUS}" -ne "${EXPECTED_STATUS}" ]]; then
		message="\e[1;31m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
		ERROR_LOG="${ERROR_LOG}${TITLE}\n${message}\n$@\n\n"
	else
		message="\e[1;32m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
	fi

	echo -e ${message} >&2
	echo "${BODY}" | jq '.' >&2
	echo "" >&2
}

TEST_STREAM() {
	TITLE=$1
	EXPECTED_STATUS=$2
	METHOD=$3
	ENDPOINT=$4
	shift 4

	set +e
	local response=$(curl -s --max-time 2 -w "%{http_code}" -X "${METHOD}" "${HOST}${ENDPOINT}" "$@")
	local curl_status=$?
	set -e

	STATUS="${response:${#response}-3}" # Last 3
	BODY="${response:0:${#response}-3}" # Exclude last 3

	if [[ "${STATUS}" -ne "${EXPECTED_STATUS}" ]]; then
		message="\e[1;31m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
		ERROR_LOG="${ERROR_LOG}${TITLE}\n${message}\n$@\n\n"
	else
		message="\e[1;32m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
	fi

	echo -e ${message} >&2
	echo "${BODY}" | jq '.' >&2 || true
	echo "" >&2

	if [[ "${curl_status}" -ne 0 && "${STATUS}" -ne "${EXPECTED_STATUS}" ]]; then
		exit "${curl_status}"
	fi
}

print_result() {
	if [[ -z "${ERROR_LOG}" ]]; then
		echo "Test Successful"
	else
		echo "List of Failed Tests:"
		echo ""
		echo -e "${ERROR_LOG}"
		exit 1
	fi
}

reset_all() {
	echo "🚀 Starting infra..."
	npm run infra:reset
	npm run apps:reset

	echo "Infra is running"
	echo ""

	# Check curl; exit if failed
	if ! CURL_OUTPUT=$(curl -sS "${HOST}" 2>&1); then
		echo "${CURL_OUTPUT}"
		exit 1
	fi
}

create_user_and_login() {
	TEST "Create a user" \
		201 POST /customers \
		-H 'Content-Type: application/json' \
		-d '{
                "name": "UserName#1",
                "email": "test@test.com",
                "birthDate": "1990-01-01T00:00:00.000Z",
                "password": "testpassword"
            }'

	USER_ID=$(echo ${BODY} | jq -r '.id')

	TEST "Login" \
		200 POST /customers/login \
		-H 'Content-Type: application/json' \
		-d '{ "email": "test@test.com", "password": "testpassword" }'

	ACCESS_TOKEN=$(echo ${BODY} | jq -r '.accessToken')
	REFRESH_TOKEN=$(echo ${BODY} | jq -r '.refreshToken')
}

movie_draft_payload() {
	cat <<EOF
{
    "title": "Sample Movie",
    "genres": ["action"],
    "releaseDate": "2020-01-01T00:00:00.000Z",
    "plot": "Sample plot for movie draft",
    "durationInSeconds": 5400,
    "director": "Sample Director",
    "rating": "PG13"
}
EOF
}

asset_payload() {
	cat <<EOF
{
    "originalName": "${FIXTURE_IMAGE_NAME}",
    "mimeType": "${FIXTURE_IMAGE_MIME}",
    "size": ${FIXTURE_IMAGE_SIZE},
    "checksum": { "algorithm": "sha256", "base64": "${FIXTURE_IMAGE_CHECKSUM}" }
}
EOF
}

create_movie_draft() {
	TEST "Create Movie Draft" \
		201 POST /movie-drafts

	echo "${BODY}" | jq -r '.id'
}

update_movie_draft() {
	local draft_id=$1

	TEST "Update Movie Draft" \
		200 PATCH /movie-drafts/${draft_id} \
		-H 'Content-Type: application/json' \
		-d "$(movie_draft_payload)"
}

upload_presigned() {
	local url=$1
	local method=$2
	local fields=$3
	local file_path=$4

	local args=()
	while IFS=$'\t' read -r key value; do
		args+=(-F "${key}=${value}")
	done <<< "${fields}"
	args+=(-F "file=@${file_path}")

	local status
	status=$(curl -sS -o /dev/null -w "%{http_code}" -X "${method}" "${url}" "${args[@]}")

	if [[ "${status}" != "204" && "${status}" != "201" ]]; then
		echo "Upload failed with status ${status}" >&2
		exit 1
	fi
}

create_and_upload_movie_draft_asset() {
	local draft_id=$1

	TEST "Create Movie Draft Asset" \
		201 POST /movie-drafts/${draft_id}/assets \
		-H 'Content-Type: application/json' \
		-d "$(asset_payload)"

	local asset_id=$(echo "${BODY}" | jq -r '.assetId')
	local upload_url=$(echo "${BODY}" | jq -r '.url')
	local upload_method=$(echo "${BODY}" | jq -r '.method')
	local upload_fields=$(echo "${BODY}" | jq -r '.fields | to_entries[] | "\(.key)\t\(.value)"')

	upload_presigned "${upload_url}" "${upload_method}" "${upload_fields}" "${FIXTURE_IMAGE_PATH}"

	echo "${asset_id}"
}

complete_movie_draft_asset() {
	local draft_id=$1
	local asset_id=$2

	TEST "Complete Movie Draft Asset" \
		200 POST /movie-drafts/${draft_id}/assets/${asset_id}/complete
}

complete_movie_draft() {
	local draft_id=$1

	TEST "Complete Movie Draft" \
		201 POST /movie-drafts/${draft_id}/complete

	echo "${BODY}" | jq -r '.id'
}

create_movie() {
	local draft_id
	local asset_id
	local movie_id

	draft_id=$(create_movie_draft)
	update_movie_draft "${draft_id}"
	asset_id=$(create_and_upload_movie_draft_asset "${draft_id}")
	complete_movie_draft_asset "${draft_id}" "${asset_id}"
	movie_id=$(complete_movie_draft "${draft_id}")

	echo "${movie_id}"
}

create_theater() {
	local name=${1:-"Sample Theater"}
	local latitude=${2:-37.5}
	local longitude=${3:-127.0}

	TEST "Create Theater" \
		201 POST /theaters \
		-H 'Content-Type: application/json' \
		-d "{
            \"name\": \"${name}\",
            \"location\": { \"latitude\": ${latitude}, \"longitude\": ${longitude} },
            \"seatmap\": { \"blocks\": [{ \"name\": \"A\", \"rows\": [{ \"name\": \"1\", \"seats\": \"OOOOXXOOOO\" }] }] }
        }"

	echo "${BODY}" | jq -r '.id'
}

request_showtime_creation() {
	local movie_id=$1
	local theater_id=$2
	local start_time=${3:-${DEFAULT_SHOWTIME_START}}
	local duration=${4:-120}

	TEST "Request Showtime Creation" \
		202 POST /showtime-creation/showtimes \
		-H 'Content-Type: application/json' \
		-d "{
            \"movieId\": \"${movie_id}\",
            \"theaterIds\": [\"${theater_id}\"],
            \"startTimes\": [\"${start_time}\"],
            \"durationInMinutes\": ${duration}
        }"

	echo "${BODY}" | jq -r '.sagaId'
}

wait_for_showtimes() {
	local theater_id=$1
	local attempts=0
	local max_attempts=15

	while [[ "${attempts}" -lt "${max_attempts}" ]]; do
		TEST "Search Showtimes" \
			200 POST /showtime-creation/showtimes:search \
			-H 'Content-Type: application/json' \
			-d "{ \"theaterIds\": [\"${theater_id}\"] }"

		local count=$(echo "${BODY}" | jq 'length')
		if [[ "${count}" -gt 0 ]]; then
			echo "${BODY}" | jq -r '.[0].id'
			return
		fi

		attempts=$((attempts + 1))
		sleep 1
	done

	echo "Timed out waiting for showtimes to be created." >&2
	exit 1
}
