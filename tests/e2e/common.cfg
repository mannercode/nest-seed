CURL() {
	METHOD=$1
	ENDPOINT=$2
	shift 2

	local response=$(curl -s -w "%{http_code}" -X "${METHOD}" "${HOST}${ENDPOINT}" "$@")

	STATUS="${response:${#response}-3}"
	BODY="${response:0:${#response}-3}"
}

TEST() {
	TITLE=$1
	EXPECTED_STATUS=$2
	METHOD=$3
	ENDPOINT=$4
	shift 4

	CURL "${METHOD}" "${ENDPOINT}" "$@"

	if [[ "${STATUS}" -ne "${EXPECTED_STATUS}" ]]; then
		message="\e[1;31m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
		ERROR_LOG="${ERROR_LOG}${TITLE}\n${message}\n$@\n\n"
	else
		message="\e[1;32m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
	fi

	echo -e "${message}" >&2
	echo "${BODY}" | jq '.' >&2
	echo "" >&2
}

SETUP() {
	METHOD=$1
	ENDPOINT=$2
	shift 2

	CURL "${METHOD}" "${ENDPOINT}" "$@"

	if [[ "${STATUS}" -ge 400 ]]; then
		message="\e[1;31mSetup failed: ${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
		echo -e "$@\n\n" >&2
		echo -e "${message}" >&2
		echo "${BODY}" | jq '.' >&2
		echo -e "\n" >&2
		exit 4
	fi
}

create_customer() {
	NAME="UserName#1"
	BIRTHDATE="1990-01-01T00:00:00.000Z"
	EMAIL="test@test.com"
	PASSWORD="testpassword"

	SETUP POST /customers \
		-H 'Content-Type: application/json' \
		-d '{
				"name": "'${NAME}'",
                "birthDate": "'${BIRTHDATE}'",
				"email": "'${EMAIL}'",
                "password": "'${PASSWORD}'"
            }'

	CUSTOMER_ID=$(echo "${BODY}" | jq -r '.id')
}

login_customer() {
	SETUP POST /customers/login \
		-H 'Content-Type: application/json' \
		-d '{ "email": "'${EMAIL}'", "password": "'${PASSWORD}'" }'

	ACCESS_TOKEN=$(echo "${BODY}" | jq -r '.accessToken')
	REFRESH_TOKEN=$(echo "${BODY}" | jq -r '.refreshToken')
}
