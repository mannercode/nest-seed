CURL() {
	METHOD=$1
	ENDPOINT=$2
	shift 2

	local response=$(curl -s -w "%{http_code}" -X "${METHOD}" "${HOST}${ENDPOINT}" "$@")

	STATUS="${response:${#response}-3}"
	BODY="${response:0:${#response}-3}"
}

TEST() {
	TITLE=$1
	EXPECTED_STATUS=$2
	METHOD=$3
	ENDPOINT=$4
	shift 4

	CURL "${METHOD}" "${ENDPOINT}" "$@"

	if [[ "${STATUS}" -ne "${EXPECTED_STATUS}" ]]; then
		message="\e[1;31m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
		ERROR_LOG="${ERROR_LOG}${TITLE}\n${message}\n$@\n\n"
	else
		message="\e[1;32m${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
	fi

	echo -e "${message}" >&2
	echo "${BODY}" | jq '.' >&2
	echo "" >&2
}

SETUP() {
	METHOD=$1
	ENDPOINT=$2
	shift 2

	CURL "${METHOD}" "${ENDPOINT}" "$@"

	if [[ "${STATUS}" -ge 400 ]]; then
		message="\e[1;31mSetup failed: ${STATUS}\e[0m \e[1;35m${METHOD}\e[0m \e[1;36m${HOST}${ENDPOINT}\e[0m"
		echo -e "$@\n\n" >&2
		echo -e "${message}" >&2
		echo "${BODY}" | jq '.' >&2
		echo -e "\n" >&2
		exit 4
	fi
}

random_email() {
    epoch_ns=$(date +%s%N)
    printf 'test.%s.%s@example.com\n' "$epoch_ns" "$RANDOM"
}


CUSTOMER_NAME="customer name"
CUSTOMER_BIRTHDATE="1990-01-01T00:00:00.000Z"
CUSTOMER_PASSWORD="testpassword"
CUSTOMER_EMAIL="customer@example.com"

create_customer() {
	CUSTOMER_EMAIL=$(random_email)

	SETUP POST /customers \
		-H 'Content-Type: application/json' \
		-d '{
				"name": "'${CUSTOMER_NAME}'",
                "birthDate": "'${CUSTOMER_BIRTHDATE}'",
				"email": "'${CUSTOMER_EMAIL}'",
                "password": "'${CUSTOMER_PASSWORD}'"
            }'

	CUSTOMER_ID=$(echo "${BODY}" | jq -r '.id')
}

login_customer() {
	SETUP POST /customers/login \
		-H 'Content-Type: application/json' \
		-d '{ "email": "'${CUSTOMER_EMAIL}'", "password": "'${CUSTOMER_PASSWORD}'" }'

	CUSTOMER_ACCESS_TOKEN=$(echo "${BODY}" | jq -r '.accessToken')
	CUSTOMER_REFRESH_TOKEN=$(echo "${BODY}" | jq -r '.refreshToken')
}
