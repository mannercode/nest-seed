x-mongo-base: &mongo-base
    extends: { file: ./compose.common.yml, service: common-options }
    image: $MONGO_IMAGE
    # 테스트 데이터가 많으면 MongoDB 메모리 캐시가 부족해 조회가 느려진다.
    # 데이터를 메모리에 더 오래 둘 수 있도록 컨테이너와 캐시 용량을 늘린다.
    deploy: { resources: { limits: { memory: 2g } } }
    shm_size: '8m'
    # MongoDB 복제 묶음을 만들고 테스트를 동시에 돌릴 때 열 수 있는 파일 수가 부족하지 않도록 한도를 넉넉하게 둔다.
    ulimits: { nofile: { soft: 65536, hard: 65536 } }
    # 개발 및 테스트용 MongoDB 복제 묶음(Replica Set)이다.
    # 운영용 보안 설정보다는 테스트 속도와 설정 단순성을 우선한다.
    # 27016 포트는 인증(MONGO_INITDB_*)을 쓰던 시절 엔트리포인트가 27017에 띄우던 임시 mongod와의 충돌을 피한 값이다.
    # 인증 제거 후 임시 mongod는 더 이상 뜨지 않지만, MONGO_URI 등 접속 값이 이 포트와 짝이라 유지한다.
    command: >
        --replSet mongo
        --bind_ip_all
        --port 27016
        --wiredTigerCacheSizeGB 1.0

services:
    mongo1:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo2:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo3:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo-setup:
        extends: { file: ./compose.common.yml, service: common-options }
        image: $MONGO_IMAGE
        depends_on:
            {
                mongo1: { condition: service_healthy },
                mongo2: { condition: service_healthy },
                mongo3: { condition: service_healthy }
            }
        command: |
            sh -eucx '
                # `rs.initiate`에 등록한 host는 드라이버가 이후 Replica Set 멤버를 찾아갈 때 그대로 사용한다.
                # devcontainer도 같은 compose 네트워크에 있으므로 서비스 이름(mongo1/mongo2/mongo3)을 등록한다.
                url="mongodb://mongo1:27016/?directConnection=true"

                mongosh $$url --eval "
                    rs.initiate({
                    _id: \"mongo\",
                    members: [
                        { _id: 0, host: \"mongo1:27016\" },
                        { _id: 1, host: \"mongo2:27016\" },
                        { _id: 2, host: \"mongo3:27016\" }
                        ]
                    })
                    "

                # `rs.initiate`를 mongo1에 보냈어도 첫 선출은 mongo2/3가 이길 수 있다.
                # mongo1이 PRIMARY인지만 보면 그 경우 영원히 false라 타임아웃으로 끝난다.
                # 어느 멤버든 PRIMARY가 되면 통과하도록 집합 전체의 멤버 상태를 확인한다.
                i=0
                until mongosh $$url --eval "rs.status().members.some(m => m.stateStr === \"PRIMARY\")" | grep -q "true"; do
                    i=$$((i+1))
                    if [ $$i -ge 60 ]; then
                        echo "MongoDB replica set did not become PRIMARY in time" >&2
                        exit 1
                    fi
                    sleep 1
                done
            '
