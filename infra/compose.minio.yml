services:
    minio:
        extends: { file: ./compose.common.yml, service: common-options }
        image: ${MINIO_IMAGE}
        deploy: { resources: { limits: { memory: 256m } } }
        shm_size: '8m'
        # 앱과 테스트는 compose 네트워크 안에서 S3 API(9000)에 접근한다.
        # 호스트에는 브라우저로 확인할 웹 콘솔(9001)만 노출한다.
        ports: ['9001:9001']
        environment:
            # :?가 없으면 부재가 빈 문자열로 통과해 두세 단계 하류에서 'MinIO unhealthy'로 오진단된다.
            MINIO_ROOT_USER: ${S3_ACCESS_KEY:?}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?}
            MINIO_BROWSER_REDIRECT_URL: ${S3_CONSOLE_ENDPOINT:?}
        command: 'server /data --console-address :9001'
        healthcheck:
            test: 'curl -fsS http://localhost:9000/minio/health/ready'

    minio-setup:
        extends: { file: ./compose.common.yml, service: common-options }
        image: amazon/aws-cli:2.35.2
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: /bin/sh
        command: >
            -c "
            aws --endpoint-url http://minio:9000 s3 mb s3://${S3_BUCKET:?} ||
            aws --endpoint-url http://minio:9000 s3 ls s3://${S3_BUCKET}
            "
        environment:
            AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:?}
            AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:?}
            AWS_DEFAULT_REGION: ${S3_REGION:?}
            AWS_EC2_METADATA_DISABLED: 'true'
            S3_BUCKET: ${S3_BUCKET:?}
