x-app-base: &app-base
    env_file:
        - .env
    environment:
        - NODE_ENV=production
        - MONGO_REPLICA_SET
        - MONGO_USERNAME
        - MONGO_PASSWORD
        - MONGO_DATABASE
        - MONGO_HOST1
        - MONGO_PORT1
        - MONGO_HOST2
        - MONGO_PORT2
        - MONGO_HOST3
        - MONGO_PORT3
        - REDIS_HOST1
        - REDIS_PORT1
        - REDIS_HOST2
        - REDIS_PORT2
        - REDIS_HOST3
        - REDIS_PORT3
        - REDIS_HOST4
        - REDIS_PORT4
        - REDIS_HOST5
        - REDIS_PORT5
        - REDIS_HOST6
        - REDIS_PORT6
        - S3_ENDPOINT
        - S3_REGION
        - S3_BUCKET
        - S3_ACCESS_KEY
        - S3_SECRET_KEY
        - S3_FORCE_PATH_STYLE
    logging: { options: { max-size: '1m', max-file: '1' } }
    extra_hosts: ['host.docker.internal:host-gateway']
    healthcheck:
        {
            retries: 5,
            start_period: 10s,
            interval: 3s,
            timeout: 3s,
            test: 'curl -fsS http://localhost:$HTTP_PORT/health'
        }

services:
    app:
        <<: *app-base
        build: { context: . }
        image: nest-mono
        container_name: app
        ports: ['${HTTP_PORT}:${HTTP_PORT}']

    apps-setup:
        image: docker:cli
        container_name: apps-setup
        depends_on:
            app: { condition: service_healthy }
