worker_processes 8;
# cycle-20: auto (16 CPU 호스트 기준 16 worker) 대비 8 worker 가 필터 read
# +21%, empty read +8% 개선. proxy 전용 역할이라 worker 늘려도 추가 이득
# 없고 context switch 비용만 커짐. 8 고정.

events {
    worker_connections 1024;
}

http {
    # Extended access log: adds which upstream served the request, the status
    # that upstream returned, and upstream/request timing. Makes it possible
    # to correlate a 502 with a specific replica.
    log_format upstreamlog '$remote_addr - - [$time_local] "$request" $status $body_bytes_sent '
                           'upstream=$upstream_addr u_status=$upstream_status '
                           'u_rt=$upstream_response_time rt=$request_time';
    access_log /dev/stdout upstreamlog;
    error_log  /dev/stderr warn;

    # cycle-26: JSON API 응답에 gzip 압축. size=50 페이지 ~25KB JSON 이
    # gzip 으로 5-8KB 로 줄어 네트워크 전송량 감소. 서버 CPU 미미하게 증가.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types application/json;
    gzip_proxied any;
    gzip_vary on;

    upstream mono_app {
        least_conn;
        server app:3000;
        # cycle-25: 32 → 128 로 증가. worker 8 × app 8 replica = 64+ 커넥션
        # 필요한데 32 는 부족. 128 에서 empty read +13%, filter +20%.
        # 256 까지 올려도 추가 이득은 3% 이내라 128 에서 멈춤.
        keepalive 128;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://mono_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # cycle-27: 기본 `proxy_buffers 8 4k` 는 총 32KB 뿐. size=50 응답
            # (~12KB) 및 cycle-26 gzip 전 상태 고려하면 동시성 높은 구간에서
            # buffer spill 로 disk temp 로 떨어질 위험. 16 × 8k = 128KB 로
            # 여유 확보.
            proxy_buffers 16 8k;
            proxy_buffer_size 8k;
        }

        location /health {
            proxy_pass http://mono_app/health;
        }
    }
}
