x-mongo-base: &mongo-base
    extends: { file: ./compose.common.yml, service: common-options }
    image: $MONGO_IMAGE
    # Phase 2 (cycle-11): 1 GiB → 2 GiB. cycle-09 에서 250K theaters 시점에
    # WT cache 256 MiB 가 evict 시작하면서 read RPS 가 c=200 에서 ~1000 으로
    # 떨어졌음. 메모리 증설로 cache 한도를 함께 끌어올린다.
    deploy: { resources: { limits: { memory: 2g } } }
    shm_size: '8m'
    # "Too many open files" 에러 방지
    ulimits: { nofile: { soft: 65536, hard: 65536 } }
    # auth 와 keyFile 모두 제거 — replica set 멤버 간 inter-cluster auth 가 빠짐.
    # 의도: dev/test devcontainer 와 CI 만 사용하는 환경 + 운영은 어차피 매니지드
    # 서비스 (DocumentDB 등) 라 keyFile 흉내가 의미 없음. 이 단순화로
    # mongo-key-generator 컨테이너와 mongodb_key 볼륨이 통째로 빠진다.
    # 27016 포트 trick 은 그대로 — initdb 임시 mongod 와의 충돌 회피용.
    command: >
        --replSet mongo
        --bind_ip_all
        --port 27016
        --wiredTigerCacheSizeGB 1.0

services:
    mongo1:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo2:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo3:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo-setup:
        extends: { file: ./compose.common.yml, service: common-options }
        image: $MONGO_IMAGE
        depends_on:
            {
                mongo1: { condition: service_healthy },
                mongo2: { condition: service_healthy },
                mongo3: { condition: service_healthy }
            }
        command: |
            sh -eucx '
                # rs.initiate 의 host 는 client 가 다시 접속할 때 쓰는 advertise 주소.
                # devcontainer 도 같은 nest-seed 네트워크에 join 하므로 service
                # name (mongo1/mongo2/mongo3) 으로 도달 가능하다.
                url="mongodb://mongo1:27016/?directConnection=true"

                mongosh $$url --eval "
                    rs.initiate({
                    _id: \"mongo\",
                    members: [
                        { _id: 0, host: \"mongo1:27016\" },
                        { _id: 1, host: \"mongo2:27016\" },
                        { _id: 2, host: \"mongo3:27016\" }
                        ]
                    })
                    "

                i=0
                until mongosh $$url --eval "rs.status().ok" | grep -q "1"; do
                    i=$$((i+1))
                    if [ $$i -ge 60 ]; then
                        echo "MongoDB replica set did not become PRIMARY in time" >&2
                        exit 1
                    fi
                    sleep 1
                done
            '
