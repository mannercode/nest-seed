x-mongo-base: &mongo-base
    extends: { file: ./compose.common.yml, service: common-options }
    image: $MONGO_IMAGE
    # Phase 2 (cycle-11): 1 GiB → 2 GiB. cycle-09 에서 250K theaters 시점에
    # WT cache 256 MiB 가 evict 시작하면서 read RPS 가 c=200 에서 ~1000 으로
    # 떨어졌음. 메모리 증설로 cache 한도를 함께 끌어올린다.
    deploy: { resources: { limits: { memory: 2g } } }
    shm_size: '8m'
    environment:
        { MONGO_INITDB_ROOT_USERNAME: mongouser, MONGO_INITDB_ROOT_PASSWORD: mongopass }
    # "Too many open files" 에러 방지
    ulimits: { nofile: { soft: 65536, hard: 65536 } }
    # 27016 포트로 변경하는 이유
    # - MONGO_INITDB_* 또는 /docker-entrypoint-initdb.d 스크립트가 있으면 엔트리포인트가 127.0.0.1:27017로
    #   초기화용 임시 mongod를 실행해 admin/root 사용자 생성 등 초기화를 수행한다.
    # - 초기화가 끝나면 임시 mongod를 종료하고 서비스용 mongod를 다시 실행한다.
    # - 이 전환 과정에서 27017 포트 충돌로 "Address already in use"가 간헐적으로 발생할 수 있어,
    #   서비스용 mongod 포트를 27016으로 변경한다.
    command: >
        --replSet mongo
        --keyFile /etc/mongodb/mongodb.key
        --bind_ip_all
        --port 27016
        --wiredTigerCacheSizeGB 1.0
    volumes: ['mongodb_key:/etc/mongodb']
    depends_on: ['mongo-key-generator']

services:
    mongo-key-generator:
        extends: { file: ./compose.common.yml, service: common-options }
        container_name: mongo-key-generator
        image: $MONGO_IMAGE
        command: |
            sh -euc '
            openssl rand -base64 768 > mongodb.key &&
            chmod 400 mongodb.key &&
            chown mongodb:mongodb mongodb.key
            '
        volumes: ['mongodb_key:/mongodb_key']
        working_dir: /mongodb_key

    mongo1:
        <<: *mongo-base
        container_name: mongo1
        ports: ['27017:27016']
        healthcheck:
            test: >
                mongosh  "mongodb://mongouser:mongopass@host.docker.internal:27017/?authSource=admin"
                --eval "db.adminCommand('ping')"

    mongo2:
        <<: *mongo-base
        container_name: mongo2
        ports: ['27018:27016']
        healthcheck:
            test: >
                mongosh  "mongodb://mongouser:mongopass@host.docker.internal:27018/?authSource=admin"
                --eval "db.adminCommand('ping')"

    mongo3:
        <<: *mongo-base
        container_name: mongo3
        ports: ['27019:27016']
        healthcheck:
            test: >
                mongosh  "mongodb://mongouser:mongopass@host.docker.internal:27019/?authSource=admin"
                --eval "db.adminCommand('ping')"

    mongo-setup:
        extends: { file: ./compose.common.yml, service: common-options }
        container_name: mongo-setup
        image: $MONGO_IMAGE
        depends_on:
            {
                mongo1: { condition: service_healthy },
                mongo2: { condition: service_healthy },
                mongo3: { condition: service_healthy }
            }
        command: |
            sh -eucx '
                url="mongodb://mongouser:mongopass@host.docker.internal:27017/?authSource=admin"

                mongosh $$url --eval "
                    rs.initiate({
                    _id: \"mongo\",
                    members: [
                        { _id: 0, host: \"host.docker.internal:27017\" },
                        { _id: 1, host: \"host.docker.internal:27018\" },
                        { _id: 2, host: \"host.docker.internal:27019\" }
                        ]
                    })
                    "

                i=0
                until mongosh $$url --eval "rs.status().ok" | grep -q "1"; do
                    i=$$((i+1))
                    if [ $$i -ge 60 ]; then
                        echo "MongoDB replica set did not become PRIMARY in time" >&2
                        exit 1
                    fi
                    sleep 1
                done
            '

volumes:
    mongodb_key: {}
