x-mongo-base: &mongo-base
    extends: { file: ./compose.common.yml, service: common-options }
    image: $MONGO_IMAGE
    # WiredTiger 캐시가 데이터를 다 못 담고 비우기 시작하면 읽기 속도가
    # 크게 떨어진다. 컨테이너 메모리와 `wiredTigerCacheSizeGB` 를 함께
    # 올려서 시드 규모(수십만 행) 안에서는 비우기가 일어나지 않게 한다.
    deploy: { resources: { limits: { memory: 2g } } }
    shm_size: '8m'
    # "Too many open files" 에러 방지.
    ulimits: { nofile: { soft: 65536, hard: 65536 } }
    # 인증은 끄고 쓴다. 운영은 매니지드 서비스로 가므로 keyFile 인증은
    # 의미가 없고, dev/test 에서는 운영 부담이 더 크다.
    # 포트는 27016 을 쓴다. 27017 을 그대로 쓰면 mongo 이미지의 init 단계에서
    # 임시로 띄우는 mongod 와 충돌한다.
    command: >
        --replSet mongo
        --bind_ip_all
        --port 27016
        --wiredTigerCacheSizeGB 1.0

services:
    mongo1:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo2:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo3:
        <<: *mongo-base
        healthcheck:
            test: >
                mongosh "mongodb://localhost:27016/?directConnection=true"
                --eval "db.adminCommand('ping')"

    mongo-setup:
        extends: { file: ./compose.common.yml, service: common-options }
        image: $MONGO_IMAGE
        depends_on:
            {
                mongo1: { condition: service_healthy },
                mongo2: { condition: service_healthy },
                mongo3: { condition: service_healthy }
            }
        command: |
            sh -eucx '
                # `rs.initiate` 가 등록하는 host 는 클라이언트가 다음에
                # 접속할 때 다시 쓰는 주소다. devcontainer 도 같은 compose
                # 네트워크 안에 있으므로 service 이름(mongo1/mongo2/mongo3)
                # 으로 닿는다.
                url="mongodb://mongo1:27016/?directConnection=true"

                mongosh $$url --eval "
                    rs.initiate({
                    _id: \"mongo\",
                    members: [
                        { _id: 0, host: \"mongo1:27016\" },
                        { _id: 1, host: \"mongo2:27016\" },
                        { _id: 2, host: \"mongo3:27016\" }
                        ]
                    })
                    "

                i=0
                until mongosh $$url --eval "rs.status().ok" | grep -q "1"; do
                    i=$$((i+1))
                    if [ $$i -ge 60 ]; then
                        echo "MongoDB replica set did not become PRIMARY in time" >&2
                        exit 1
                    fi
                    sleep 1
                done
            '
