services:
    nats:
        extends: { file: ./compose.common.yml, service: common-options }
        image: $NATS_IMAGE
        deploy: { resources: { limits: { memory: 256m } } }
        shm_size: '8m'
        # `--store_dir /data` 는 named volume 에 매핑되므로 컨테이너를
        # 재시작해도 stream 이 남는다. `-m 8222` 는 healthcheck 가 쓸
        # 모니터링 HTTP 포트를 연다.
        command: >
            --name nats
            -js
            --store_dir /data
            -m 8222
        volumes:
            - nats_data:/data
        # `/healthz` 는 NATS 2.10+ 의 표준 health endpoint 다.
        # `?js-enabled-only=true` 를 붙이면 JetStream 이 떴는지도 같이
        # 확인한다.
        healthcheck:
            test: 'wget -qO- "http://localhost:8222/healthz?js-enabled-only=true" || exit 1'

volumes:
    nats_data: {}
