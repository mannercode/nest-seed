services:
    temporal-postgresql:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_POSTGRES_IMAGE
        container_name: temporal-postgresql
        environment:
            POSTGRES_USER: temporal
            POSTGRES_PASSWORD: temporal
            POSTGRES_DB: temporal
        ports: ['$TEMPORAL_DB_PORT:5432']
        volumes:
            - temporal_pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U temporal']
        deploy: { resources: { limits: { memory: 2g } } }
        shm_size: '256m'

    # auto-setup 의 schema setup 부분 — one-shot. temporal/visibility 두 DB
    # create + setup-schema + update-schema. 멱등 (재실행 시 create 만 fail
    # 하고 update 는 성공하도록 setup-postgres.sh 가 처리).
    temporal-setup:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_ADMIN_TOOLS_IMAGE
        container_name: temporal-setup
        depends_on:
            temporal-postgresql: { condition: service_healthy }
        environment:
            # SQL_PASSWORD 는 temporal-sql-tool 이 실제 사용하는 변수.
            # POSTGRES_PWD 는 다른 도구용 — 둘 다 set 해야 schema 작업 통과.
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            SQL_PASSWORD: temporal
        volumes:
            - ./scripts:/scripts:ro
        entrypoint: ['/bin/sh']
        command: '/scripts/setup-postgres.sh'

    temporal:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_SERVER_IMAGE
        container_name: temporal
        depends_on:
            temporal-setup: { condition: service_completed_successfully }
        environment:
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            BIND_ON_IP: 0.0.0.0
            DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
        ports: ['$TEMPORAL_PORT:7233']
        volumes:
            - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
        healthcheck:
            test: ['CMD-SHELL', 'nc -z localhost 7233']
            interval: 5s
            start_period: 30s
        # 1g 에서 증설 — sustained test load 에서 `docker stats` 로 보면
        # temporal server 가 1g cap 의 99.99% 에 고정돼 Go runtime 이
        # thrashing GC 에 빠지고 persistence 호출이 timeout 됐다 (transfer-queue
        # 와 timer-queue 태스크에서 계속 보이던 "context deadline exceeded" 실패).
        deploy: { resources: { limits: { memory: 3g } } }
        shm_size: '16m'

    # auto-setup 이 자동으로 만들던 default namespace — server only 는 안
    # 만들어주므로 admin-tools 의 `temporal operator namespace create` 로
    # one-shot. 이미 존재하면 idempotent.
    temporal-create-namespace:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_ADMIN_TOOLS_IMAGE
        container_name: temporal-create-namespace
        depends_on:
            temporal: { condition: service_healthy }
        environment:
            TEMPORAL_ADDRESS: temporal:7233
            DEFAULT_NAMESPACE: default
        volumes:
            - ./scripts:/scripts:ro
        entrypoint: ['/bin/sh']
        command: '/scripts/create-namespace.sh'

volumes:
    temporal_pgdata: {}
