services:
    temporal-postgresql:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_POSTGRES_IMAGE
        environment:
            POSTGRES_USER: temporal
            POSTGRES_PASSWORD: temporal
            POSTGRES_DB: temporal
        # 상영 생성 작업 기록이 많이 쌓이면 기본 메모리 설정으로는 DB 조회가 느려져 작업 처리가 시간 안에 끝나지 않는다.
        # 2GB 한도 안에서 DB가 사용할 메모리를 늘린다.
        command:
            - postgres
            - -c
            - max_connections=200
            - -c
            - shared_buffers=512MB
            - -c
            - work_mem=16MB
        volumes:
            - temporal_pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U temporal']
        deploy: { resources: { limits: { memory: 2g } } }
        shm_size: '256m'

    # 서버 이미지는 필요한 DB 구조를 직접 만들지 않는다.
    # 준비 컨테이너가 `temporal`과 `temporal_visibility` DB 구조를 만들고 변경 사항을 반영한다.
    temporal-setup:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_ADMIN_TOOLS_IMAGE
        depends_on:
            temporal-postgresql: { condition: service_healthy }
        environment:
            # Temporal 도구마다 비밀번호를 읽는 변수 이름이 달라 같은 값을 둘 다 넣는다.
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            SQL_PASSWORD: temporal
        volumes:
            - ./scripts:/scripts:ro
        entrypoint: ['/bin/sh']
        command: '/scripts/setup-postgres.sh'

    temporal:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_SERVER_IMAGE
        depends_on:
            temporal-setup: { condition: service_completed_successfully }
        environment:
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            BIND_ON_IP: 0.0.0.0
            DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
        volumes:
            - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
        healthcheck:
            test: ['CMD-SHELL', 'nc -z localhost 7233']
            interval: 5s
            start_period: 30s
        # 서버 메모리가 1GB일 때는 개발 환경 시작 직후 내부 작업 준비가 시간 안에 끝나지 않았다.
        # 테스트가 안정적으로 시작되도록 3GB를 준다.
        deploy: { resources: { limits: { memory: 3g } } }
        shm_size: '16m'

    # 서버 이미지는 기본 작업 공간(namespace)을 만들지 않는다.
    # 서버 준비가 끝난 뒤 별도 컨테이너가 기본 작업 공간을 만든다.
    temporal-create-namespace:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_ADMIN_TOOLS_IMAGE
        depends_on:
            temporal: { condition: service_healthy }
        environment:
            TEMPORAL_ADDRESS: temporal:7233
            DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE}
        volumes:
            - ./scripts:/scripts:ro
        entrypoint: ['/bin/sh']
        command: '/scripts/create-namespace.sh'

volumes:
    temporal_pgdata: {}
