services:
    temporal-postgresql:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_POSTGRES_IMAGE
        environment:
            POSTGRES_USER: temporal
            POSTGRES_PASSWORD: temporal
            POSTGRES_DB: temporal
        volumes:
            - temporal_pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U temporal']
        deploy: { resources: { limits: { memory: 2g } } }
        shm_size: '256m'

    # server м „мҡ© мқҙлҜём§ҖлҠ” DB мҠӨнӮӨл§ҲлҘј л§Ңл“Өм§Җ м•ҠмҠөлӢҲлӢӨ. admin-toolsм—җм„ң
    # `temporal`кіј `temporal_visibility` мҠӨнӮӨл§ҲлҘј м Ғмҡ©н•ҳкі , мқҙлҜё мғқм„ұлҗң DBм—җм„ңлҸ„
    # versioned schema updateлҠ” кі„мҶҚ мӢӨн–үлҗҳкІҢ л‘ЎлӢҲлӢӨ.
    temporal-setup:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_ADMIN_TOOLS_IMAGE
        depends_on:
            temporal-postgresql: { condition: service_healthy }
        environment:
            # temporal-sql-toolмқҖ SQL_PASSWORDлҘј, мқјл¶Җ Temporal лҸ„кө¬лҠ” POSTGRES_PWDлҘј
            # мқҪмҠөлӢҲлӢӨ. л‘җ ліҖмҲҳм—җ к°ҷмқҖ к°’мқ„ л„Јм–ҙ лҸ„кө¬лі„ нҷҳкІҪ ліҖмҲҳ м°ЁмқҙлҘј нқЎмҲҳн•©лӢҲлӢӨ.
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            SQL_PASSWORD: temporal
        volumes:
            - ./scripts:/scripts:ro
        entrypoint: ['/bin/sh']
        command: '/scripts/setup-postgres.sh'

    temporal:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_SERVER_IMAGE
        depends_on:
            temporal-setup: { condition: service_completed_successfully }
        environment:
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            BIND_ON_IP: 0.0.0.0
            DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
        volumes:
            - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
        healthcheck:
            test: ['CMD-SHELL', 'nc -z localhost 7233']
            interval: 5s
            start_period: 30s
        # 1GB м ңн•ңм—җм„ңлҠ” devcontainer л¶ҖнҢ… м§Ғнӣ„ transfer-queueмҷҖ timer-queueк°Җ
        # "context deadline exceeded"лЎң мҙҲкё°нҷ”м—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. н…ҢмҠӨнҠё нҷҳкІҪмқҳ
        # м•Ҳм •м„ұмқ„ мң„н•ҙ м„ңлІ„ м»Ён…Ңмқҙл„Ҳм—җ 3GBлҘј л°°м •н•©лӢҲлӢӨ.
        deploy: { resources: { limits: { memory: 3g } } }
        shm_size: '16m'

    # server м „мҡ© мқҙлҜём§ҖлҠ” default namespaceлҘј мғқм„ұн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ. м„ңлІ„к°Җ healthyк°Җ
    # лҗң л’Ө admin-toolsм—җм„ң namespaceлҘј ліҙмһҘн•©лӢҲлӢӨ.
    temporal-create-namespace:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_ADMIN_TOOLS_IMAGE
        depends_on:
            temporal: { condition: service_healthy }
        environment:
            TEMPORAL_ADDRESS: temporal:7233
            DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE}
        volumes:
            - ./scripts:/scripts:ro
        entrypoint: ['/bin/sh']
        command: '/scripts/create-namespace.sh'

volumes:
    temporal_pgdata: {}
