services:
    temporal-postgresql:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_POSTGRES_IMAGE
        environment:
            POSTGRES_USER: temporal
            POSTGRES_PASSWORD: temporal
            POSTGRES_DB: temporal
        volumes:
            - temporal_pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U temporal']
        deploy: { resources: { limits: { memory: 2g } } }
        shm_size: '256m'

    # server 전용 이미지는 DB 스키마를 만들지 않습니다. admin-tools에서
    # `temporal`과 `temporal_visibility` 스키마를 적용하고, 이미 생성된 DB에서도
    # versioned schema update는 계속 실행되게 둡니다.
    temporal-setup:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_ADMIN_TOOLS_IMAGE
        depends_on:
            temporal-postgresql: { condition: service_healthy }
        environment:
            # temporal-sql-tool은 SQL_PASSWORD를, 일부 Temporal 도구는 POSTGRES_PWD를
            # 읽습니다. 두 변수에 같은 값을 넣어 도구별 환경 변수 차이를 흡수합니다.
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            SQL_PASSWORD: temporal
        volumes:
            - ./scripts:/scripts:ro
        entrypoint: ['/bin/sh']
        command: '/scripts/setup-postgres.sh'

    temporal:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_SERVER_IMAGE
        depends_on:
            temporal-setup: { condition: service_completed_successfully }
        environment:
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            BIND_ON_IP: 0.0.0.0
            DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
        volumes:
            - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
        healthcheck:
            test: ['CMD-SHELL', 'nc -z localhost 7233']
            interval: 5s
            start_period: 30s
        # 1GB 제한에서는 devcontainer 부팅 직후 transfer-queue와 timer-queue가
        # "context deadline exceeded"로 초기화에 실패했습니다. 테스트 환경의
        # 안정성을 위해 서버 컨테이너에 3GB를 배정합니다.
        deploy: { resources: { limits: { memory: 3g } } }
        shm_size: '16m'

    # server 전용 이미지는 default namespace를 생성하지 않습니다. 서버가 healthy가
    # 된 뒤 admin-tools에서 namespace를 보장합니다.
    temporal-create-namespace:
        extends: { file: ../compose.common.yml, service: common-options }
        image: $TEMPORAL_ADMIN_TOOLS_IMAGE
        depends_on:
            temporal: { condition: service_healthy }
        environment:
            TEMPORAL_ADDRESS: temporal:7233
            DEFAULT_NAMESPACE: default
        volumes:
            - ./scripts:/scripts:ro
        entrypoint: ['/bin/sh']
        command: '/scripts/create-namespace.sh'

volumes:
    temporal_pgdata: {}
