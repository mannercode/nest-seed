include:
    - ./compose.mongo.yml
    - ./compose.minio.yml
    - ./compose.redis.yml
    - ./compose.nats.yml
    - ./temporal/compose.temporal.yml

services:
    infra-setup:
        extends: { file: ./compose.common.yml, service: common-options }
        image: $DOCKER_IMAGE
        container_name: infra-setup
        depends_on:
            mongo-key-generator: { condition: service_completed_successfully }
            mongo-setup: { condition: service_completed_successfully }
            redis-setup: { condition: service_completed_successfully }
            minio-setup: { condition: service_completed_successfully }
            temporal-create-namespace: { condition: service_completed_successfully }
            nats: { condition: service_healthy }
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
        command: 'rm mongo-key-generator mongo-setup redis-setup minio-setup temporal-setup temporal-create-namespace'
