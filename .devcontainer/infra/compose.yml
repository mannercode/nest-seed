include:
    - ./compose.mongo.yml
    - ./compose.minio.yml
    - ./compose.redis.yml
    - ./compose.nats.yml
    - ./temporal/compose.temporal.yml

services:
    # 모든 setup 이 끝났음을 알리는 sentinel. `reset.sh` 가 이 컨테이너의
    # 종료를 기다려 infra 가 준비된 시점을 안다. 종료된 setup 컨테이너 정리는
    # `reset.sh` 가 맡는다.
    infra-setup:
        extends: { file: ./compose.common.yml, service: common-options }
        image: alpine:3
        depends_on:
            mongo-setup: { condition: service_completed_successfully }
            redis-setup: { condition: service_completed_successfully }
            minio-setup: { condition: service_completed_successfully }
            temporal-create-namespace: { condition: service_completed_successfully }
            nats: { condition: service_healthy }
        command: ['true']

# devcontainer 와 deploy compose 가 같은 네트워크에 함께 들어와야 한다.
# 그래서 외부 네트워크로 둔다. 이름은 workspace 폴더 이름과 같다.
# devcontainer.json 의 `containerEnv` 가 `COMPOSE_PROJECT_NAME` 으로 그
# 값을 자동으로 넣어 준다.
networks:
    default:
        name: ${COMPOSE_PROJECT_NAME}
        external: true
