services:
    minio:
        extends: { file: ./compose.common.yml, service: common-options }
        image: ${MINIO_IMAGE}
        deploy: { resources: { limits: { memory: 256m } } }
        shm_size: '8m'
        # 9000 (S3 API) 은 같은 네트워크에서 service name 으로 접근. 9001 은
        # 호스트 브라우저로 console 보려는 용도라 호스트에 expose.
        ports: ['9001:9001']
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
            MINIO_BROWSER_REDIRECT_URL: ${S3_CONSOLE_ENDPOINT}
        command: 'server /data --console-address :9001'
        healthcheck:
            test: 'curl -fsS http://localhost:9000/minio/health/ready'

    minio-setup:
        extends: { file: ./compose.common.yml, service: common-options }
        image: amazon/aws-cli
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: /bin/sh
        command: >
            -c "
            aws --endpoint-url http://minio:9000 s3 mb s3://${S3_BUCKET} ||
            aws --endpoint-url http://minio:9000 s3 ls s3://${S3_BUCKET}
            "
        environment:
            AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
            AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
            AWS_DEFAULT_REGION: ${S3_REGION}
            AWS_EC2_METADATA_DISABLED: 'true'
            S3_BUCKET: ${S3_BUCKET}
