# ==============================================================================
# Kong + NestJS 마이크로서비스 기능 데모
# ==============================================================================
#
# 실행: docker compose up --build
#
# 아키텍처:
#   클라이언트 → Kong (:8000) ─┬─ /users/**    → users (:3001)
#                              ├─ /products/** → products (:3002)
#                              └─ /orders/**   → orders (:3003) [인증 필요]
#
# Kong Admin API: http://localhost:8001
#
# ── 기능별 테스트 ──────────────────────────────────────────────────────
#
# 1) 기본 라우팅:
#    curl http://localhost:8000/users
#    curl http://localhost:8000/products
#
# 2) Rate Limiting (분당 10회 초과 시 429):
#    for i in $(seq 1 12); do curl -s -o /dev/null -w "%{http_code}\n" http://localhost:8000/products; done
#
# 3) Proxy Cache (두 번째 요청부터 X-Cache-Status: Hit):
#    curl -i http://localhost:8000/products
#    curl -i http://localhost:8000/products
#
# 4) API Key 인증:
#    curl http://localhost:8000/orders                                    → 401
#    curl http://localhost:8000/orders -H 'apikey: admin-secret-key-123'  → 200
#    curl http://localhost:8000/orders -H 'apikey: public-key-789'        → 403 (ACL)
#
# 5) Request/Response Transformer (헤더 확인):
#    curl -i http://localhost:8000/users
#    → X-API-Version: v1, X-Powered-By: Kong 확인
#
# 6) Correlation ID (요청 추적):
#    curl -i http://localhost:8000/users
#    → Kong-Request-ID 헤더 확인
#
# 7) Kong 관리 API:
#    curl http://localhost:8001/routes      → 라우트 목록
#    curl http://localhost:8001/services    → 서비스 목록
#    curl http://localhost:8001/plugins     → 플러그인 목록
#    curl http://localhost:8001/consumers   → 소비자 목록

services:
    kong:
        image: kong:3.7
        container_name: demo-kong
        environment:
            KONG_DATABASE: 'off'
            KONG_DECLARATIVE_CONFIG: /kong/kong.yml
            KONG_PROXY_LISTEN: '0.0.0.0:8000'
            KONG_ADMIN_LISTEN: '0.0.0.0:8001'
            KONG_PROXY_ACCESS_LOG: /dev/stdout
            KONG_PROXY_ERROR_LOG: /dev/stderr
        volumes:
            - ./kong/kong.yml:/kong/kong.yml:ro
        ports:
            - '8000:8000'
            - '8001:8001'
        depends_on:
            users: { condition: service_started }
            products: { condition: service_started }
            orders: { condition: service_started }

    users:
        build: ./users
        container_name: demo-kong-users
        environment:
            PORT: '3001'

    products:
        build: ./products
        container_name: demo-kong-products
        environment:
            PORT: '3002'

    orders:
        build: ./orders
        container_name: demo-kong-orders
        environment:
            PORT: '3003'
