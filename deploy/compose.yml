x-api-base: &api-base
    env_file:
        - ../.env.infra
        - ../.env.api
    environment:
        # deploy 시에는 .env.api의 NODE_ENV=test와 LOG_DIRECTORY=./_output/logs를 덮어쓴다.
        # 비밀번호 암호화(bcrypt)와 파일 작업은 같은 작업 스레드를 사용한다.
        # 기본 4개로는 요청이 몰릴 때 부족하므로 16개로 늘린다.
        - NODE_ENV=production
        - UV_THREADPOOL_SIZE=16
        - LOG_DIRECTORY=/app/logs
    logging: { options: { max-size: '10m', max-file: '3' } }
    healthcheck:
        retries: 5
        start_period: 10s
        interval: 10s
        timeout: 5s
        test: 'curl -fsS http://localhost:${API_PORT}/health'

services:
    api:
        <<: *api-base
        build:
            context: ..
            dockerfile: apps/api/Dockerfile
            args:
                DEPS_TAG: ${DEPS_TAG:?DEPS_TAG must be set}
        image: nest-seed-api
        deploy:
            replicas: 4

    nginx:
        image: nginx:1.31-alpine
        ports: ['3000:80']
        volumes: ['./nginx.conf:/etc/nginx/nginx.conf:ro']
        depends_on:
            api: { condition: service_healthy }
        restart: unless-stopped

networks:
    default:
        name: ${COMPOSE_PROJECT_NAME}
        external: true
