x-api-base: &api-base
    environment:
        - NODE_ENV=production
        # libuv thread pool: bcrypt 와 fs 연산이 여기서 돈다. 기본값 4 는
        # password hashing 폭주 (POST /users, login) 로 금방 포화돼 요청
        # 완료를 막고 upstream reset 을 유발한다.
        - UV_THREADPOOL_SIZE=16
        - PROJECT_ID=${PROJECT_ID}
        - HTTP_PORT=${HTTP_PORT:-3000}
        - HTTP_REQUEST_PAYLOAD_LIMIT=${HTTP_REQUEST_PAYLOAD_LIMIT:-50mb}
        - HTTP_PAGINATION_DEFAULT_SIZE=${HTTP_PAGINATION_DEFAULT_SIZE:-50}
        - AUTH_ACCESS_SECRET=${AUTH_ACCESS_SECRET}
        - AUTH_ACCESS_TOKEN_EXPIRATION=${AUTH_ACCESS_TOKEN_EXPIRATION:-30m}
        - AUTH_REFRESH_SECRET=${AUTH_REFRESH_SECRET}
        - AUTH_REFRESH_TOKEN_EXPIRATION=${AUTH_REFRESH_TOKEN_EXPIRATION:-7d}
        - AUTH_ISSUER=${AUTH_ISSUER}
        - AUTH_AUDIENCE=${AUTH_AUDIENCE}
        - MONGO_URI=${MONGO_URI}
        - MONGO_DATABASE=${MONGO_DATABASE}
        - REDIS_HOST1=${REDIS_HOST1}
        - REDIS_PORT1=${REDIS_PORT1}
        - REDIS_HOST2=${REDIS_HOST2}
        - REDIS_PORT2=${REDIS_PORT2}
        - REDIS_HOST3=${REDIS_HOST3}
        - REDIS_PORT3=${REDIS_PORT3}
        - NATS_HOST=${NATS_HOST}
        - NATS_PORT=${NATS_PORT}
        - TEMPORAL_HOST=${TEMPORAL_HOST}
        - TEMPORAL_PORT=${TEMPORAL_PORT}
        - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE}
        - S3_ENDPOINT=${S3_ENDPOINT}
        - S3_REGION=${S3_REGION}
        - S3_BUCKET=${S3_BUCKET}
        - S3_ACCESS_KEY=${S3_ACCESS_KEY}
        - S3_SECRET_KEY=${S3_SECRET_KEY}
        - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
        - LOG_DIRECTORY=/app/logs
        - LOG_DAYS_TO_KEEP=${LOG_DAYS_TO_KEEP:-3d}
        - LOG_FILE_LEVEL=${LOG_FILE_LEVEL:-verbose}
        - LOG_CONSOLE_LEVEL=${LOG_CONSOLE_LEVEL:-info}
    logging: { options: { max-size: '10m', max-file: '3' } }
    healthcheck:
        retries: 5
        start_period: 10s
        interval: 10s
        timeout: 5s
        test: 'curl -fsS http://localhost:${HTTP_PORT:-3000}/health'

services:
    api:
        <<: *api-base
        # build 는 호스트 docker daemon 의 호스트 경로 컨텍스트가 필요해 격리를
        # 깬다. 외부에서 `tar c | docker build -` 로 미리 image 를 만들고 여기는
        # tag 만 참조한다 (deploy/test.sh, ensure-deps-image.sh 가 빌드 책임).
        image: api
        deploy:
            replicas: ${REPLICAS:-4}

    nginx:
        image: nginx:alpine
        ports: ['${LISTEN_PORT:-3000}:80']
        # nginx.conf 는 source volume 안에서 절대경로로 참조. bind mount 회피.
        volumes:
            - nest-seed-workspace:/workspaces/nest-seed:ro
        command: ['nginx', '-c', '/workspaces/nest-seed/deploy/nginx.conf', '-g', 'daemon off;']
        depends_on:
            api: { condition: service_healthy }
        restart: unless-stopped

# infra (mongo/redis/nats/temporal/minio) 와 같은 외부 네트워크에 join 해
# service name 으로 직접 접근.
networks:
    default:
        name: nest-seed-infra
        external: true

volumes:
    # devcontainer 가 workspaceMount 로 사용하는 source volume.
    nest-seed-workspace:
        external: true
