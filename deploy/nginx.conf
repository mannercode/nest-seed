worker_processes 8;
# 이 nginx 는 프록시 역할만 한다. worker 수를 호스트 CPU 만큼 띄우는
# `auto` 보다 8 로 고정한 쪽이 빨랐다. 더 늘리면 worker 사이 전환 비용만
# 늘고 처리량이 떨어진다.

events {
    worker_connections 1024;
}

http {
    # 어떤 upstream 이 처리했는지, 그 upstream 이 무슨 status 를 돌려줬는지,
    # upstream 응답 시간과 전체 요청 시간을 함께 남긴다. 502 가 났을 때
    # 어느 replica 가 원인인지 바로 찾는다.
    log_format upstreamlog '$remote_addr - - [$time_local] "$request" $status $body_bytes_sent '
                           'upstream=$upstream_addr u_status=$upstream_status '
                           'u_rt=$upstream_response_time rt=$request_time';
    access_log /dev/stdout upstreamlog;
    error_log  /dev/stderr warn;

    # JSON 응답을 gzip 으로 보낸다. 페이지네이션 결과처럼 반복이 많은 본문은
    # 5~8 배까지 작아진다. 압축 비용은 무시할 만하다.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types application/json;
    gzip_proxied any;
    gzip_vary on;

    upstream api {
        least_conn;
        server api:3000;
        # 필요한 keep-alive 커넥션 수는 worker 수와 api replica 수에 비례
        # 한다. 기본값 32 는 모자라고, 128 로 두면 충분하다. 더 올려도
        # 측정값에서 이득이 보이지 않는다.
        keepalive 128;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # 기본값 `proxy_buffers 8 4k` 는 총 32KB 다. 압축 전 응답이
            # 크고 동시에 많이 들어오면 이 한도를 넘어 디스크 임시 파일로
            # 떨어진다. 128KB 까지 늘려서 메모리 안에서 끝내게 한다.
            proxy_buffers 16 8k;
            proxy_buffer_size 8k;
        }

        # SSE 경로다. 기본 `proxy_read_timeout` 60초로는 saga 가 늦어질 때
        # nginx 가 끊어 버린다. NestJS 쪽에서 keep-alive 를 길게 잡으면
        # `app.close()` 가 막히므로 쓸 수 없다. 그래서 nginx 에서 타임아웃을
        # 늘리고 버퍼링을 꺼서 이벤트를 바로 흘려보낸다.
        location = /showtime-creation/event-stream {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location /health {
            proxy_pass http://api/health;
        }
    }
}
