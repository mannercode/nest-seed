worker_processes 8;
# 이 nginx는 프록시 역할만 한다. worker 수를 호스트 CPU 수에 맞추는
# `auto`보다 8로 고정했을 때 처리량이 더 높았다. 더 늘리면 worker 사이
# 전환 비용만 증가하고 처리량이 낮아진다.

events {
    worker_connections 1024;
}

http {
    # 어떤 upstream이 처리했는지, 그 upstream이 어떤 status를 반환했는지,
    # upstream 응답 시간과 전체 요청 시간을 함께 남긴다. 502가 났을 때
    # 어느 replica가 원인인지 즉시 찾는다.
    log_format upstreamlog '$remote_addr - - [$time_local] "$request" $status $body_bytes_sent '
                           'upstream=$upstream_addr u_status=$upstream_status '
                           'u_rt=$upstream_response_time rt=$request_time';
    access_log /dev/stdout upstreamlog;
    error_log  /dev/stderr warn;

    # JSON 응답을 gzip으로 보낸다. 페이지네이션 결과처럼 반복이 많은 본문은
    # 5~8배까지 줄어든다. 압축 비용은 무시할 만하다.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types application/json;
    gzip_proxied any;
    gzip_vary on;

    upstream api {
        least_conn;
        server api:3000;
        # 필요한 keep-alive 커넥션 수는 worker 수와 API replica 수에 비례한다.
        # 기본값 32는 부족하고, 128로 두면 충분하다. 더 늘려도
        # 측정값에서 이득이 보이지 않는다.
        keepalive 128;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # 기본값 `proxy_buffers 8 4k`는 총 32KB다. 압축 전 응답이
            # 크고 동시에 많이 들어오면 이 한도를 넘어 디스크 임시 파일을
            # 사용한다. 128KB까지 늘려서 메모리 안에서 처리되도록 한다.
            proxy_buffers 16 8k;
            proxy_buffer_size 8k;
        }

        # SSE 경로다. 기본 `proxy_read_timeout` 60초로는 saga가 늦어질 때
        # nginx가 연결을 종료한다. NestJS에서 keep-alive를 길게 설정하면
        # `app.close()` 종료가 지연되어 사용할 수 없다. 그래서 nginx에서 타임아웃을
        # 늘리고 버퍼링을 꺼서 이벤트를 즉시 전달한다.
        location = /showtime-creation/event-stream {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location /health {
            proxy_pass http://api/health;
        }
    }
}
