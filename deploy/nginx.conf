worker_processes 8;
# nginx는 API로 요청을 전달하는 역할만 한다. 작업 프로세스를 자동으로
# 정하는 것보다 8개로 고정했을 때 빨랐고, 더 늘리면 오히려 느려졌다.

events {
    worker_connections 1024;
}

http {
    # 요청을 처리한 API 컨테이너와 응답 코드, 걸린 시간을 로그에 남긴다.
    # 502 오류가 나면 어느 컨테이너에서 문제가 났는지 확인할 수 있다.
    log_format upstreamlog '$remote_addr - - [$time_local] "$request" $status $body_bytes_sent '
                           'upstream=$upstream_addr u_status=$upstream_status '
                           'u_rt=$upstream_response_time rt=$request_time';
    access_log /dev/stdout upstreamlog;
    error_log  /dev/stderr warn;

    # 목록 응답처럼 같은 형식이 반복되는 JSON은 압축하면 5~8배 작아진다.
    # 측정상 압축으로 인한 처리 속도 차이는 무시할 만하다.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types application/json;
    gzip_proxied any;
    gzip_vary on;

    upstream api {
        least_conn;
        server api:3000;
        # API 컨테이너와 재사용할 연결 수다. 기본 32개로는 요청이 몰릴 때
        # 부족했고, 128개보다 늘려도 측정상 더 빨라지지 않았다.
        keepalive 128;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;

            # 큰 응답이 한꺼번에 들어오면 기본 버퍼(32KB)를 넘어 임시 파일을
            # 사용한다. 버퍼를 128KB로 늘려 가능한 한 메모리에서 처리한다.
            proxy_buffers 16 8k;
            proxy_buffer_size 8k;
        }

        # 진행 상황을 계속 보내는 연결이다. 작업 완료가 늦어질 수 있어 nginx의
        # 대기 시간을 늘린다. Node 서버의 연결 대기를 늘리면 종료가 늦어지므로,
        # nginx 쪽만 조정하고 이벤트는 모아 두지 않고 바로 전달한다.
        location = /showtime-creation/event-stream {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;
        }

        location /health {
            proxy_pass http://api/health;
        }
    }
}
