name: CI
on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']
    schedule:
        # 6시간마다 :17 UTC 에 실행해 commit 이 없어도 main 이 주기적으로 green
        # 으로 돌아 dependency/infra 변경으로 인한 회귀를 잡는다.
        - cron: '17 */6 * * *'
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    test-atoz:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run atoz
