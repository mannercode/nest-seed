name: Test AtoZ
on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']
    schedule:
        # UTC 기준 6 시간마다 매시 :17에 실행합니다. 새 커밋이 없어도 main이
        # 주기적으로 통과하는지 확인해, 의존성이나 인프라 변경으로 생긴
        # 회귀를 조기에 검출합니다.
        - cron: '17 */6 * * *'
    workflow_dispatch:
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    test-atoz:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run atoz
