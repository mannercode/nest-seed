name: Test Stability
on:
    schedule:
        - cron: '0 */6 * * *'
    workflow_dispatch:
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    unit-libs:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 100 npm run test:unit -w libs
    unit-mono:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 100 npm run test:unit -w apis/mono
    unit-msa:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 100 npm run test:unit -w apis/msa
    bootup-mono:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 20 bash .github/scripts/bootup-test.sh mono
    bootup-msa:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 20 bash .github/scripts/bootup-test.sh msa
    stress-mono:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      bash .github/scripts/repeat.sh 100 npm run test:stress -w apis/mono
