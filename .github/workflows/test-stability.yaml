name: Test Stability
on:
    workflow_dispatch:
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    unit:
        strategy:
            fail-fast: false
            matrix:
                scope: [libs, apps/api]
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v5
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 75 npm test -w ${{ matrix.scope }} -- --coverageThreshold='{}'
    bootup:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v5
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 50 bash .github/scripts/bootup-test.sh
    scenario:
        strategy:
            fail-fast: false
            matrix:
                scenario:
                    - sse
                    - user-race
                    - ticket-holding-race
                    - showtime-overlap-race
                    - purchase-double-spend
                    - replica-chaos
                    - jwt-refresh-race
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v5
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      bash .github/scripts/repeat.sh 50 bash apps/api/tests/runner.sh ${{ matrix.scenario }}
