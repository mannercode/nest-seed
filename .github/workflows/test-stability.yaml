name: Test Stability
on:
    workflow_dispatch:
    schedule:
        # UTC 기준 6 시간마다 매시 :27에 실행한다.
        # test-atoz가 3시간마다 회귀를 잡는다면, 이 워크플로는 같은 시나리오를 누적 반복해 "한 번은 통과하지만 흔들리는" 코드를 드러내는 용도이다.
        - cron: '27 */6 * * *'
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    # 6시간 주기에 한 회차가 ~350분 걸리므로, 취소하면 거의 끝난 직전 회차가 버려진다.
    # 새 회차는 이전 회차가 끝날 때까지 대기한다.
    cancel-in-progress: false
jobs:
    stability:
        strategy:
            fail-fast: false
            # 모든 레그는 같은 단계(checkout → Docker Hub 로그인 → devcontainer 실행)를 쓰므로,
            # 레그별 차이(시간 한계, 실행 명령)만 행으로 둔다.
            matrix:
                include:
                    # unit: 단위/통합 테스트 누적 반복.
                    # libs는 75회라도 ~140분이지만, apps/api는 컨텍스트 부팅 비용 때문에 회당 ~5분이라 75회면 GitHub 6시간 상한(360분)을 넘긴다.
                    # 그래서 apps/api는 상한 안에 드는 60회로 줄이고, libs가 apps/api 한계에 묶이지 않게 레그를 나눠 시간 한계를 따로 둔다.
                    - leg: unit-libs
                      timeout: 180
                      run: |
                          npm run build
                          bash .github/scripts/repeat.sh 75 npm test -w libs -- --coverageThreshold='{}'
                    - leg: unit-api
                      timeout: 350
                      run: |
                          npm run build
                          bash .github/scripts/repeat.sh 60 npm test -w apps/api -- --coverageThreshold='{}'
                    # bootup: 인프라 compose 전체를 내렸다 올리는 infra/reset.sh를 반복해 부팅 안정성을 본다.
                    - leg: bootup
                      timeout: 120
                      run: |
                          npm run build
                          bash .github/scripts/repeat.sh 50 bash infra/reset.sh
                    # scenario: 분산 레이스 시나리오 반복. 50회는 의도된 누적 검증량이다.
                    # 240분은 가장 느린 시나리오(user-signup-race 50회 ~200분)에 여유를 둔 값.
                    # sse-fanout-race는 회차당 사가 1,500개(150 inner × 10)를 만들어 다른 시나리오보다 워크플로 밀도가 압도적으로 높다.
                    # 기본 RESET_EVERY=10이면 리셋 전에 Temporal이 transfer-queue 정체 구간까지 누적되므로 더 자주 초기화한다.
                    - leg: sse-fanout-race
                      timeout: 240
                      run: RESET_EVERY=5 bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh sse-fanout-race
                    - leg: user-signup-race
                      timeout: 240
                      run: bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh user-signup-race
                    - leg: ticket-holding-race
                      timeout: 240
                      run: bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh ticket-holding-race
                    - leg: showtime-overlap-race
                      timeout: 240
                      run: bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh showtime-overlap-race
                    - leg: purchase-double-spend
                      timeout: 240
                      run: bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh purchase-double-spend
                    - leg: purchase-overlap-race
                      timeout: 240
                      run: bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh purchase-overlap-race
                    - leg: replica-chaos
                      timeout: 240
                      run: bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh replica-chaos
                    - leg: jwt-refresh-race
                      timeout: 240
                      run: bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh jwt-refresh-race
        runs-on: ubuntu-24.04-arm
        timeout-minutes: ${{ matrix.timeout }}
        steps:
            - uses: actions/checkout@v7
            - name: Login to Docker Hub (host)
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              env:
                  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  env: |
                      DOCKERHUB_USERNAME
                      DOCKERHUB_TOKEN
                  runCmd: |
                      set -Eeuo pipefail
                      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                      ${{ matrix.run }}
