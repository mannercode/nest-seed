name: Test Stability
on:
    workflow_dispatch:
permissions:
    contents: read
    packages: write
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    # scenario job 의 runner.sh 가 deps 이미지를 사용하므로 먼저 보장.
    # hash 동일 시 ~5초 skip — 실제 빌드는 lockfile/deps.Dockerfile 변경시만.
    build-deps:
        uses: ./.github/workflows/build-deps-image.yaml
        secrets: inherit

    unit:
        needs: build-deps
        strategy:
            fail-fast: false
            matrix:
                scope: [libs, apps/api]
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 75 npm test -w ${{ matrix.scope }} -- --coverageThreshold='{}'
    bootup:
        needs: build-deps
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 50 bash .github/scripts/bootup-test.sh
    scenario:
        needs: build-deps
        strategy:
            fail-fast: false
            matrix:
                scenario:
                    - sse
                    - user-race
                    - ticket-holding-race
                    - showtime-overlap-race
                    - purchase-double-spend
                    - replica-chaos
                    - jwt-refresh-race
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      bash .github/scripts/repeat.sh 50 bash apps/api/tests/runner.sh ${{ matrix.scenario }}
