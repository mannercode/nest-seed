name: Test Stability
on:
    workflow_dispatch:
    schedule:
        # Every 6 hours at :17 UTC (09:17 / 15:17 / 21:17 / 03:17 KST).
        - cron: '17 */6 * * *'
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    unit:
        strategy:
            fail-fast: false
            matrix:
                scope: [libs, apps/api]
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  env: |
                      DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
                      DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
                  runCmd: |
                      set -Eeuo pipefail
                      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                      npm run build
                      bash .github/scripts/repeat.sh 100 npm test -w ${{ matrix.scope }} --if-present -- --coverageThreshold='{}'
    bootup:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  env: |
                      DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
                      DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
                  runCmd: |
                      set -Eeuo pipefail
                      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                      npm run build
                      bash .github/scripts/repeat.sh 100 bash .github/scripts/bootup-test.sh
    scenario:
        strategy:
            fail-fast: false
            matrix:
                scenario:
                    - sse
                    - user-race
                    - ticket-holding-race
                    - showtime-overlap-race
                    - purchase-double-spend
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  env: |
                      DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
                      DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
                  runCmd: |
                      set -Eeuo pipefail
                      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                      bash .github/scripts/repeat.sh 50 bash apps/api/tests/runner.sh ${{ matrix.scenario }}
