name: Test Stability
on:
    workflow_dispatch:
    schedule:
        # Every 6 hours at :17 UTC (09:17 / 15:17 / 21:17 / 03:17 KST).
        - cron: '17 */6 * * *'
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    unit:
        strategy:
            fail-fast: false
            matrix:
                scope: [libs, apps/api]
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh 100 npm test -w ${{ matrix.scope }} --if-present -- --coverageThreshold='{}'
    bootup:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - scope: api
                      count: 100
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      npm run build
                      bash .github/scripts/repeat.sh ${{ matrix.count }} bash .github/scripts/bootup-test.sh ${{ matrix.scope }}
    scenario:
        strategy:
            fail-fast: false
            matrix:
                scenario:
                    - sse
                    - user-race
                    - ticket-holding-race
                    - showtime-overlap-race
                    - purchase-double-spend
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 360
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      bash .github/scripts/repeat.sh 50 bash apps/api/tests/runner.sh ${{ matrix.scenario }}
