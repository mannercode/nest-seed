name: Test Stability
on:
    workflow_dispatch:
    schedule:
        # UTC 기준 6 시간마다 매시 :27에 실행한다.
        # test-atoz가 3시간마다 회귀를 잡는다면, 이 워크플로는 같은 시나리오를 누적 반복해 "한 번은 통과하지만 흔들리는" 코드를 드러내는 용도이다.
        - cron: '27 */6 * * *'
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    unit:
        strategy:
            fail-fast: false
            matrix:
                scope: [libs, apps/api]
        runs-on: ubuntu-24.04-arm
        # libs 75회는 ~140분이면 끝나지만 apps/api 75회는 컨텍스트 부팅 비용 때문에 GitHub 6시간 상한(360분)에 근접한다.
        # 레그마다 한계를 따로 둬 libs가 apps/api 때문에 길게 잡히지 않게 한다.
        timeout-minutes: ${{ matrix.scope == 'apps/api' && 350 || 180 }}
        steps:
            - uses: actions/checkout@v5
            - name: Login to Docker Hub (host)
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              env:
                  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  env: |
                      DOCKERHUB_USERNAME
                      DOCKERHUB_TOKEN
                  runCmd: |
                      set -Eeuo pipefail
                      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                      npm run build
                      bash .github/scripts/repeat.sh 75 npm test -w ${{ matrix.scope }} -- --coverageThreshold='{}'
    bootup:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 120
        steps:
            - uses: actions/checkout@v5
            - name: Login to Docker Hub (host)
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              env:
                  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  env: |
                      DOCKERHUB_USERNAME
                      DOCKERHUB_TOKEN
                  runCmd: |
                      set -Eeuo pipefail
                      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                      npm run build
                      bash .github/scripts/repeat.sh 50 bash infra/reset.sh
    scenario:
        strategy:
            fail-fast: false
            matrix:
                scenario:
                    - sse-fanout-race
                    - user-signup-race
                    - ticket-holding-race
                    - showtime-overlap-race
                    - purchase-double-spend
                    - replica-chaos
                    - jwt-refresh-race
        runs-on: ubuntu-24.04-arm
        # 가장 느린 시나리오(user-signup-race 50회 ~200분)에 여유를 둔 값. 50회 반복은 의도된 누적 검증량이다.
        timeout-minutes: 240
        steps:
            - uses: actions/checkout@v5
            - name: Login to Docker Hub (host)
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              env:
                  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  env: |
                      DOCKERHUB_USERNAME
                      DOCKERHUB_TOKEN
                  runCmd: |
                      set -Eeuo pipefail
                      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                      bash .github/scripts/repeat.sh 50 bash tests/api-race/runner.sh ${{ matrix.scenario }}
