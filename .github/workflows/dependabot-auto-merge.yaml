# `--auto` 머지는 main 룰셋의 필수 검사(test-atoz)가 통과해야 실행된다. 실패한 PR은 머지되지 않고 열린 채 남는다.
#
# 전제가 되는 레포 설정은 깃 밖에 있어 fork하면 직접 다시 켜야 한다:
# - 보안 경고 시 수정 PR 자동 생성:
#   gh api -X PUT repos/{owner}/{repo}/automated-security-fixes
# - auto-merge 허용과 머지된 브랜치 자동 삭제:
#   gh api -X PATCH repos/{owner}/{repo} -F allow_auto_merge=true -F delete_branch_on_merge=true
# - main 룰셋: "test-atoz가 통과해야 main에 들어갈 수 있다"는 규칙. 이게 없으면 --auto는 기다릴 조건이 없어 검사 전에 머지된다.
#   Settings → Rules → Rulesets에서 만든다: Target branches에 main, Require status checks to pass에 test-atoz.
#   이 규칙은 main 직푸시도 막으므로, Bypass list에 Repository admin role을 넣어 관리자 푸시는 예외로 둔다.
name: Dependabot Auto Merge
on:
    pull_request:
        branches: ['main']
# dependabot이 트리거한 실행의 GITHUB_TOKEN은 기본 읽기 전용이라 머지 권한을 명시한다.
permissions:
    contents: write
    pull-requests: write
jobs:
    auto-merge:
        if: github.actor == 'dependabot[bot]'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - run: gh pr merge --auto --squash "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
