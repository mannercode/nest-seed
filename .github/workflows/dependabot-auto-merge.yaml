# `--auto` 머지는 main 룰셋의 필수 검사(test-atoz)가 통과해야 실행된다. 실패한 PR은 머지되지 않고 열린 채 남는다.
#
# 전제가 되는 레포 설정은 깃 밖에 있어 fork하면 직접 다시 켜야 한다:
# - 보안 경고 시 수정 PR 자동 생성:
#   gh api -X PUT repos/{owner}/{repo}/automated-security-fixes
# - auto-merge 허용과 머지된 브랜치 자동 삭제:
#   gh api -X PATCH repos/{owner}/{repo} -F allow_auto_merge=true -F delete_branch_on_merge=true
# - main 룰셋(Settings → Rules → Rulesets): test-atoz를 required status check로 추가하고, 직푸시가 막히지 않게 Repository admin을 bypass에 넣는다.
name: Dependabot Auto Merge
on:
    pull_request:
        branches: ['main']
# dependabot이 트리거한 실행의 GITHUB_TOKEN은 기본 읽기 전용이라 머지 권한을 명시한다.
permissions:
    contents: write
    pull-requests: write
jobs:
    auto-merge:
        if: github.actor == 'dependabot[bot]'
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - run: gh pr merge --auto --squash "$PR_URL"
              env:
                  PR_URL: ${{ github.event.pull_request.html_url }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
