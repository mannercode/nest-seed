# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: Tests

on:
    schedule:
        - cron: '0 */6 * * *'
    workflow_dispatch:
        inputs:
            run_repeat_unit:
                description: 'Run repeat-unit job'
                type: boolean
                default: false
            run_repeat_e2e:
                description: 'Run repeat-e2e job'
                type: boolean
                default: false

jobs:
    repeat-unit:
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_repeat_unit) || github.event_name == 'schedule' }}
        # On GitHub, ARM is 15% faster than x86.
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4
            - name: Prepare host mount
              run: mkdir -p "${HOME}/.codex"
            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      start_ts=$(date +%s)

                      for ((i = 1; i <= 50; i++)); do
                          elapsed=$(($(date +%s) - start_ts))
                          printf '[Run %d/50 | Elapsed %02d:%02d:%02d]\n' "${i}" $((elapsed/3600)) $(((elapsed%3600)/60)) $((elapsed%60))
                          npm test
                      done

    repeat-e2e:
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_repeat_e2e) || github.event_name == 'schedule' }}
        # On GitHub, ARM is 15% faster than x86.
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4
            - name: Prepare host mount
              run: mkdir -p "${HOME}/.codex"
            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      dump_compose_logs () {
                          docker ps -a || true
                          docker stats -a --no-stream

                          for id in $(docker ps -aq); do
                              echo "========================= ${id} ========================="
                              docker logs "${id}" || true
                          done
                      }
                      trap 'rc=$?; if [ ${rc} -ne 0 ]; then dump_compose_logs; fi; exit ${rc}' EXIT

                      start_ts=$(date +%s)

                      for ((i = 1; i <= 200; i++)); do
                          elapsed=$(($(date +%s) - start_ts))
                          printf '[Run %d/200 | Elapsed %02d:%02d:%02d]\n' "${i}" $((elapsed/3600)) $(((elapsed%3600)/60)) $((elapsed%60))
                          npm run test:e2e
                      done
