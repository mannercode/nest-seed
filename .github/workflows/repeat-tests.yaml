# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: Tests
on:
    schedule:
        - cron: '0 */6 * * *'
    workflow_dispatch:
        inputs:
            run_repeat_unit:
                description: 'Run repeat-unit job'
                type: boolean
                default: false
            run_repeat_e2e:
                description: 'Run repeat-e2e job'
                type: boolean
                default: false
permissions:
    contents: read

concurrency:
    group: repeat-tests-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    repeat-unit:
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_repeat_unit) || github.event_name == 'schedule' }}
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v5
            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      bash .github/scripts/repeat-run.sh 50 npm run test:unit

    repeat-e2e:
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_repeat_e2e) || github.event_name == 'schedule' }}
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v5
            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      bash .github/scripts/repeat-run.sh 30 npm run test:e2e
