name: Mirror Docker Images
on:
    workflow_dispatch:
    schedule:
        # Weekly Mon 02:00 UTC. Floating tags (latest, :2, :cli, minor pins
        # like 8.2) get auto-flowed into the mirror — patch-pinned dest tags
        # like RELEASE.2025-09-07T16-13-09Z stay frozen. Tag pins live in
        # .devcontainer/infra/.env (mirror these here in lockstep).
        - cron: '0 2 * * 1'
permissions:
    packages: write
concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false
jobs:
    mirror:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Tier 1: critical (data/runtime)
                    - { src: 'minio/minio:RELEASE.2025-09-07T16-13-09Z', dest: 'minio:RELEASE.2025-09-07T16-13-09Z' }
                    - { src: 'mongo:8.2',                                dest: 'mongo:8.2' }
                    - { src: 'nats:2.14-alpine',                         dest: 'nats:2.14-alpine' }
                    - { src: 'postgres:17-alpine',                       dest: 'postgres:17-alpine' }
                    - { src: 'redis:8.6-alpine',                         dest: 'redis:8.6-alpine' }
                    - { src: 'temporalio/auto-setup:1.29',               dest: 'temporal-auto-setup:1.29' }
                    # Tier 2: boot tools
                    - { src: 'amazon/aws-cli:latest',                    dest: 'aws-cli:latest' }
                    - { src: 'docker:cli',                               dest: 'docker:cli' }
                    # Tier 3: GUI (gui profile)
                    - { src: 'mongo-express:latest',                     dest: 'mongo-express:latest' }
                    - { src: 'redis/redisinsight:latest',                dest: 'redisinsight:latest' }
                    - { src: 'temporalio/ui:latest',                     dest: 'temporal-ui:latest' }
                    # Dockerfile FROM
                    - { src: 'node:24-slim',                             dest: 'node:24-slim' }
        steps:
            - uses: imjasonh/setup-crane@v0.4
            - name: Login to GHCR
              run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin
            - name: Copy ${{ matrix.src }}
              run: crane copy "${{ matrix.src }}" "ghcr.io/${{ github.repository_owner }}/mirror/${{ matrix.dest }}"
            # GHCR 패키지는 default 로 private 으로 publish 됨. mirror 이미지는
            # docker hub public 원본의 단순 미러라 private 유지할 이유 없고,
            # private 이면 외부에서 anon pull 못함 → ECONNRESET 회피 의미가
            # 절반밖에 안 살음. publish 후 명시적으로 public 으로 토글.
            - name: Make package public
              env:
                  DEST: ${{ matrix.dest }}
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  pkg="${DEST%%:*}"
                  gh api --method PATCH \
                      "/orgs/${{ github.repository_owner }}/packages/container/mirror%2F${pkg}/visibility" \
                      -f visibility=public
