name: Cleanup ghcr packages
on:
    schedule:
        # Weekly Mon 03:00 UTC.
        - cron: '0 3 * * 1'
    workflow_dispatch:

permissions:
    packages: write

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

jobs:
    # api-deps 는 lockfile 변경마다 새 태그 → 무한 누적. untagged 정리 +
    # 최근 5개 lockfile hash 만 유지.
    cleanup:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/delete-package-versions@v5
              with:
                  owner: ${{ github.repository_owner }}
                  # GitHub Packages API 는 path 의 슬래시를 URL-encode 해야 함.
                  package-name: nest-seed%2Fapi-deps
                  package-type: container
                  delete-only-untagged-versions: 'true'

            - uses: actions/delete-package-versions@v5
              with:
                  owner: ${{ github.repository_owner }}
                  # GitHub Packages API 는 path 의 슬래시를 URL-encode 해야 함.
                  package-name: nest-seed%2Fapi-deps
                  package-type: container
                  min-versions-to-keep: 5
