# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: CI

on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']

jobs:
    ci:
        runs-on: ubuntu-24.04-arm
        container:
            image: node:24-bookworm
            options: --add-host=host.docker.internal:127.0.0.1
        services:
            docker:
                image: docker:27-dind
                options: >-
                    --privileged
                env:
                    DOCKER_TLS_CERTDIR: '' # TLS 끄고 2375 사용

        env:
            # DOCKER_HOST: tcp://docker:2375
            DOCKER_BUILDKIT: 1
            WORKSPACE_ROOT: ${{ github.workspace }}
            TERM: xterm

        steps:
            - uses: actions/checkout@v4

            - name: Install Tools
              run: apt-get update && apt-get install -y curl jq iproute2

            - name: Install Docker
              run: |
                  apt-get install -y ca-certificates curl gnupg
                  install -m 0755 -d /etc/apt/keyrings
                  curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                  chmod a+r /etc/apt/keyrings/docker.gpg
                  echo \
                    "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \
                    $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                    tee /etc/apt/sources.list.d/docker.list > /dev/null
                  apt-get update
                  apt-get install -y docker-ce-cli

            # - name: Wait for DinD
            # env:
            #     DOCKER_HOST: tcp://docker:2375
            # run: |
            #     for i in $(seq 1 60); do
            #       if docker info >/dev/null 2>&1; then
            #         echo "DinD ready"
            #         exit 0
            #       fi
            #       echo "Waiting DinD... ($i/60)"
            #       sleep 1
            #     done
            #     docker info
            #     exit 1

            # - name: Setup Network
            #   run: |
            #       echo "127.0.0.1 host.docker.internal" | tee -a /etc/hosts

            # - name: Run e2e tests (x100)
            #   run: |
            #       set -e
            #       for i in $(seq 1 100); do
            #         echo "[Run $i/100]"
            #         docker ps -a
            #         npm run infra:gui
            #       done
            #       echo "Done. 100 run(s) finished."

            - name: Install Dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Run infrastructures
              run: npm run infra:reset

            - name: Run unit tests
              run: npm test

            - name: Run e2e tests
              run: npm run test:e2e

            - name: Dump Docker logs on failure
              if: ${{ failure() }}
              continue-on-error: true
              run: |
                  docker ps -a || true

                  for id in $(docker ps -aq); do
                    echo ""
                    echo "========================= $id ========================="
                    docker logs --timestamps --tail 300 "$id" || true
                  done
