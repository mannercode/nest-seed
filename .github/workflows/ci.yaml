# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: CI

on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']

jobs:
    ci:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4

            - name: Prepare host mount
              run: mkdir -p "$HOME/.codex"

            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -eux

                      npm ci
                      npm run lint
                      npm run infra:reset
                      npm test
                      npm run test:e2e

    repeat-e2e:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4
            - name: Prepare host mount
              run: mkdir -p "$HOME/.codex"
            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  push: never
                  runCmd: |
                      set -eux
                      npm ci

                      for ((i = 1; i <= 100; i++)); do
                          echo "[Run $i/100]"
                          npm run test:e2e
                      done

    repeat-unit:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4
            - name: Prepare host mount
              run: mkdir -p "$HOME/.codex"
            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  push: never
                  runCmd: |
                      set -eux
                      npm ci

                      for ((i = 1; i <= 100; i++)); do
                          echo "[Run $i/100]"
                          npm test
                      done
