name: CI
on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']
permissions:
    contents: read
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    ci:
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v5
            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -Eeuo pipefail
                      tree -I 'node_modules'
                      find . -path "./node_modules" -prune -o -type f -name "*.json" -exec ls -lh {} \;
                      npm run build
                      npm run lint
                      npm run test:unit
                      npm run test:e2e
