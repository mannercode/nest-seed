# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: CI

on:
    # Runs when a pull request targeting the main branch is created or updated
    pull_request:
        branches: ['main']
    # Runs when a pull request is merged into the main branch
    push:
        branches: ['main']

jobs:
    ci:
        runs-on: ubuntu-24.04-arm
        container: node:24-bookworm
        env:
            WORKSPACE_ROOT: ${{ github.workspace }}
            TERM: xterm # This is required to enable use of the `clear` command in bash
        steps:
            - uses: actions/checkout@v4

            - name: Install Tools
              run: apt-get update && apt-get install -y curl jq iproute2

            - name: Install Docker
              run: |
                  apt-get install -y ca-certificates curl gnupg
                  install -m 0755 -d /etc/apt/keyrings
                  curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                  chmod a+r /etc/apt/keyrings/docker.gpg
                  echo \
                    "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \
                    $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                    tee /etc/apt/sources.list.d/docker.list > /dev/null
                  apt-get update
                  apt-get install -y docker-ce-cli

            - name: Resolve host workspace path
              shell: bash
              run: |
                  echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
                  echo "HOSTNAME=$HOSTNAME"
                  HOST_WS=$(docker inspect "${HOSTNAME}" --format '{{range .Mounts}}{{if eq .Destination "'"${GITHUB_WORKSPACE}"'"}}{{.Source}}{{end}}{{end}}')
                  echo "$HOST_WS"

            - name: TEST
              run: env

            - name: TEST2
              run: |
                  docker inspect ${HOSTNAME}
                  exit 1

            - name: Setup Network
              run: |
                  GW_IP=$(ip route | awk '/default/ {print $3}')
                  echo "$GW_IP host.docker.internal" | tee -a /etc/hosts

            - name: Install Dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Run infrastructures
              run: npm run infra:reset

            - name: Run unit tests
              run: npm test

            - name: Run e2e tests
              run: npm run test:e2e
