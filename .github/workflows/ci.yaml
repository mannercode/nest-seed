# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: CI

on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # devcontainer.json에 mounts로 ${env:HOME}/.codex 를 bind 하므로
            # 러너에 디렉터리를 만들어두는 게 안전합니다.
            - name: Prepare host mount
              run: mkdir -p "$HOME/.codex"

            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  # configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -eu

                      # docker-in-docker feature 사용 시 dockerd 준비 대기(필요한 경우)
                      i=0
                      until docker info >/dev/null 2>&1; do
                        i=$((i+1))
                        if [ "$i" -ge 60 ]; then
                          echo "Docker daemon not ready"
                          exit 1
                        fi
                        sleep 1
                      done
                      docker ps -a
                      npm ci
                      npm run infra:reset

                      # 실제 CI 작업
                      npm test

