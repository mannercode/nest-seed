# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: CI

on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']

jobs:
    ci:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4

            - name: Prepare host mount
              run: mkdir -p "$HOME/.codex"

            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -eux

                      npm ci
                      npm run lint
                      npm run infra:reset
                      npm test
                      npm run test:e2e

            - name: Dump Docker logs on failure
              if: ${{ failure() }}
              continue-on-error: true
              run: |
                  docker ps -a || true

                  for id in $(docker ps -aq); do
                    echo ""
                    echo "========================= $id ========================="
                    docker logs --timestamps --tail 300 "$id" || true
                  done

    repeat-e2e:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4
            - name: Prepare host mount
              run: mkdir -p "$HOME/.codex"
            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  push: never
                  runCmd: |
                      set -eux
                      npm ci

                      for ((i = 1; i <= 100; i++)); do
                          echo "[Run $i/100]"
                          npm run test:e2e
                      done
            - name: Dump Docker logs on failure
              if: ${{ failure() }}
              continue-on-error: true
              run: |
                  docker ps -a || true

                  for id in $(docker ps -aq); do
                    echo ""
                    echo "========================= $id ========================="
                    docker logs --timestamps --tail 300 "$id" || true
                  done

    repeat-unit:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4
            - name: Prepare host mount
              run: mkdir -p "$HOME/.codex"
            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  push: never
                  runCmd: |
                      set -eux
                      npm ci

                      for ((i = 1; i <= 100; i++)); do
                          echo "[Run $i/100]"
                          npm test
                      done
            - name: Dump Docker logs on failure
              if: ${{ failure() }}
              continue-on-error: true
              run: |
                  docker ps -a || true

                  for id in $(docker ps -aq); do
                    echo ""
                    echo "========================= $id ========================="
                    docker logs --timestamps --tail 300 "$id" || true
                  done
