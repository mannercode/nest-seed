# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: CI

on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # devcontainer.json에 mounts로 ${env:HOME}/.codex 를 bind 하므로
            # 러너에 디렉터리를 만들어두는 게 안전합니다.
            - name: Prepare host mount
              run: mkdir -p "$HOME/.codex"

            - name: Run CI inside Dev Container
              uses: devcontainers/ci@v0.3
              with:
                  # configFile: .devcontainer/devcontainer.json
                  push: never
                  runCmd: |
                      set -eux

                      docker ps -a
                      set -e
                      for i in $(seq 1 100); do
                          echo "[Run $i/100]"
                          docker ps -a
                          npm run infra:gui
                      done

                      npm ci
                      npm run lint
                      npm run infra:reset
                      npm test
                      npm run test:e2e
