name: CI
on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']
    schedule:
        # Every 6 hours at :17 UTC so main gets a periodic green run even
        # without commits, catching dependency/infra-driven breakage.
        - cron: '17 */6 * * *'
permissions:
    contents: read
    packages: write
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    # api-deps 이미지가 ghcr 에 존재해야 main Dockerfile 의 FROM 이 풀림.
    # build-deps-image.yaml 가 lockfile hash 가 같으면 즉시 skip 하므로
    # 일반 코드 변경 시 ~5초로 통과.
    build-deps:
        uses: ./.github/workflows/build-deps-image.yaml
        secrets: inherit

    ci:
        needs: build-deps
        runs-on: ubuntu-24.04-arm
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v5

            # Docker Hub 익명 100/6h IP 한도는 공유 러너에서 다른 조직과
            # 합산 → 첫 pull flake 의 주범. 인증하면 200/6h 계정 격리.
            # 호스트 daemon (devcontainer build 용) + 내부 daemon (runCmd
            # 안의 docker compose 용) 둘 다 login 필요.
            - uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Run in devcontainer
              uses: devcontainers/ci@v0.3
              with:
                  configFile: .devcontainer/devcontainer.json
                  push: never
                  env: |
                      DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
                      DOCKERHUB_TOKEN=${{ secrets.DOCKERHUB_TOKEN }}
                  runCmd: |
                      set -Eeuo pipefail
                      echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
                      npm run atoz
