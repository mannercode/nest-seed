# https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
name: CI

on:
    pull_request:
        branches: ['main']
    push:
        branches: ['main']

jobs:
    ci:
        runs-on: ubuntu-24.04-arm
        container: node:24-bookworm
        env:
            WORKSPACE_ROOT: ${{ github.workspace }}
            TERM: xterm # This is required to enable use of the `clear` command in bash
            # (옵션) 포트 체크 간격/최대대기(초)
            INTERVAL_SECONDS: 1
            MAX_WAIT_SECONDS: 300
        steps:
            - name: Show runner specs
              run: |
                  uname -a || true
                  lscpu || true
                  free -h || true
                  df -h || true
                  cat /etc/os-release || true

            - uses: actions/checkout@v4

            - name: Install Tools
              run: apt-get update && apt-get install -y curl jq iproute2

            - name: Install Docker
              run: |
                  apt-get install -y ca-certificates curl gnupg
                  install -m 0755 -d /etc/apt/keyrings
                  curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                  chmod a+r /etc/apt/keyrings/docker.gpg
                  echo \
                    "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian \
                    $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                    tee /etc/apt/sources.list.d/docker.list > /dev/null
                  apt-get update
                  apt-get install -y docker-ce-cli

            - name: Setup Network
              run: |
                  GW_IP=$(ip route | awk '/default/ {print $3}')
                  echo "$GW_IP host.docker.internal" | tee -a /etc/hosts

            - name: Install netcat (for port checks)
              run: |
                  apt-get update
                  apt-get install -y netcat-openbsd

            - name: Run e2e tests (x100)
              run: |
                  set -e

                  wait_ports_free() {
                    local host="${1:-host.docker.internal}"; shift
                    local ports=("$@")
                    local interval="${INTERVAL_SECONDS:-1}"
                    local max_wait="${MAX_WAIT_SECONDS:-60}"  # 0이면 무한대기
                    local start
                    start="$(date +%s)"

                    while :; do
                      local busy=()

                      for p in "${ports[@]}"; do
                        # 연결되면(OPEN) => 누군가 LISTEN 중이라고 보고 busy 처리
                        if nc -z -w1 "$host" "$p" >/dev/null 2>&1; then
                          busy+=("$p")
                        fi
                      done

                      if [ "${#busy[@]}" -eq 0 ]; then
                        echo "OK: ports are free => ${ports[*]}"
                        return 0
                      fi

                      echo "WAIT: ports busy => ${busy[*]} (sleep ${interval}s)"
                      sleep "$interval"

                      if [ "$max_wait" -gt 0 ]; then
                        local now elapsed
                        now="$(date +%s)"
                        elapsed=$((now - start))
                        if [ "$elapsed" -ge "$max_wait" ]; then
                          echo "TIMEOUT: still busy => ${busy[*]} (waited ${elapsed}s)"
                          return 1
                        fi
                      fi
                    done
                  }

                  for i in $(seq 1 100); do
                    echo "[Run $i/100]"
                    wait_ports_free host.docker.internal 27017 27018 27019
                    npm run infra:gui
                  done
                  echo "Done. 100 run(s) finished."

            - name: Install Dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Run infrastructures
              run: npm run infra:reset

            - name: Run unit tests
              run: npm test

            - name: Run e2e tests
              run: npm run test:e2e

            - name: Dump Docker logs on failure
              if: ${{ failure() }}
              continue-on-error: true
              run: |
                  docker ps -a || true

                  for id in $(docker ps -aq); do
                    echo ""
                    echo "========================= $id ========================="
                    docker logs --timestamps --tail 300 "$id" || true
                  done
