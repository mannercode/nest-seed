name: Build Deps Image
on:
    workflow_call:
        outputs:
            tag:
                description: 'deps 이미지 tag 로 사용되는 lockfile hash'
                value: ${{ jobs.build-deps.outputs.tag }}
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - 'package-lock.json'
            - 'apps/api/deps.Dockerfile'
    pull_request:
        paths:
            - 'package-lock.json'
            - 'apps/api/deps.Dockerfile'

permissions:
    contents: read
    packages: write

concurrency:
    group: build-deps-${{ github.ref }}
    cancel-in-progress: false

jobs:
    build-deps:
        runs-on: ubuntu-24.04-arm
        outputs:
            tag: ${{ steps.hash.outputs.tag }}
        steps:
            - uses: actions/checkout@v5

            # tag 는 lockfile + deps.Dockerfile 합본 hash. deps.Dockerfile
            # 변경도 이미지에 반영되도록 포함. test.sh 도 동일 식으로 계산.
            - id: hash
              run: echo "tag=$(cat package-lock.json apps/api/deps.Dockerfile | sha256sum | cut -c1-16)" >> "$GITHUB_OUTPUT"

            # 같은 hash 의 이미지가 이미 ghcr 에 있으면 빌드 skip — 일반 코드
            # 변경 (lockfile 동일) 시 워크플로 ~5초로 즉시 통과. `docker
            # manifest inspect` 는 experimental 플래그 없으면 exit 1 을
            # 뱉어 무한 rebuild 됨 — buildx imagetools inspect 가 안전.
            - id: check
              env:
                  TAG: ${{ steps.hash.outputs.tag }}
              run: |
                  if docker buildx imagetools inspect \
                       "ghcr.io/${{ github.repository }}/api-deps:${TAG}" >/dev/null 2>&1; then
                      echo "exists=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "exists=false" >> "$GITHUB_OUTPUT"
                  fi

            - if: steps.check.outputs.exists == 'false'
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # CI runner (ubuntu-24.04-arm) 와 amd64 devcontainer 둘 다 같은
            # api-deps 이미지를 pull 하므로 multi-arch 필수. QEMU 로 native arch
            # 외 cross-build. npm ci 는 대부분 pure JS 라 emulation 비용 작음.
            - if: steps.check.outputs.exists == 'false'
              uses: docker/setup-qemu-action@v3

            - if: steps.check.outputs.exists == 'false'
              uses: docker/setup-buildx-action@v4

            - if: steps.check.outputs.exists == 'false'
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: apps/api/deps.Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ghcr.io/${{ github.repository }}/api-deps:${{ steps.hash.outputs.tag }}
