# 의존성이 전부 정확 고정(exact pin)이라 갱신 장치가 없으면 포크한 시점부터 묵기 시작한다.
# 월 1회 전부 한 PR로 묶어 받고, 보안 취약점 PR은 주기와 무관하게 바로 열린다.
# 올라온 PR은 기존 test-atoz 워크플로(pull_request 트리거)가 그대로 검증한다.
version: 2
updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: monthly
      groups:
          npm-all:
              patterns: ['*']
    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: monthly
      groups:
          actions-all:
              patterns: ['*']
