# 의존성이 전부 정확 고정(exact pin)이라 갱신 장치가 없으면 포크한 시점부터 묵기 시작한다.
# 주 1회 전부 한 PR로 묶어 받고, 보안 취약점 PR은 주기와 무관하게 바로 열린다.
# 올라온 PR은 기존 test-atoz 워크플로(pull_request 트리거)가 그대로 검증한다.
version: 2
updates:
    - package-ecosystem: npm
      directory: '/'
      schedule:
          interval: weekly
      groups:
          npm-all:
              patterns: ['*']
      # dependabot은 선언된 범위와 무관하게 @types/node를 최신 메이저로 고쳐 쓴 PR을 올린다.
      # 타입의 메이저는 런타임 Node 메이저(devcontainer 이미지)와 짝이라 어긋나면 빌드가 깨진다.
      # 메이저 범프 제안을 막는다. 런타임 Node를 올릴 때 타입도 함께 올린다.
      ignore:
          - dependency-name: '@types/node'
            update-types: ['version-update:semver-major']
    - package-ecosystem: github-actions
      directory: '/'
      schedule:
          interval: weekly
      groups:
          actions-all:
              patterns: ['*']
