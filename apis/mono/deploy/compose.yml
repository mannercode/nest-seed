x-app-base: &app-base
    environment:
        - NODE_ENV=production
        - HTTP_PORT=3000
        - HTTP_REQUEST_PAYLOAD_LIMIT=${HTTP_REQUEST_PAYLOAD_LIMIT:-50mb}
        - HTTP_PAGINATION_DEFAULT_SIZE=${HTTP_PAGINATION_DEFAULT_SIZE:-50}
        - AUTH_ACCESS_SECRET=${AUTH_ACCESS_SECRET}
        - AUTH_ACCESS_TOKEN_EXPIRATION=${AUTH_ACCESS_TOKEN_EXPIRATION:-30m}
        - AUTH_REFRESH_SECRET=${AUTH_REFRESH_SECRET}
        - AUTH_REFRESH_TOKEN_EXPIRATION=${AUTH_REFRESH_TOKEN_EXPIRATION:-7d}
        - MONGO_REPLICA_SET=${MONGO_REPLICA_SET}
        - MONGO_USERNAME=${MONGO_USERNAME}
        - MONGO_PASSWORD=${MONGO_PASSWORD}
        - MONGO_DATABASE=${MONGO_DATABASE}
        - MONGO_HOST1=${MONGO_HOST1}
        - MONGO_PORT1=${MONGO_PORT1}
        - MONGO_HOST2=${MONGO_HOST2}
        - MONGO_PORT2=${MONGO_PORT2}
        - MONGO_HOST3=${MONGO_HOST3}
        - MONGO_PORT3=${MONGO_PORT3}
        - REDIS_HOST1=${REDIS_HOST1}
        - REDIS_PORT1=${REDIS_PORT1}
        - REDIS_HOST2=${REDIS_HOST2}
        - REDIS_PORT2=${REDIS_PORT2}
        - REDIS_HOST3=${REDIS_HOST3}
        - REDIS_PORT3=${REDIS_PORT3}
        - REDIS_HOST4=${REDIS_HOST4}
        - REDIS_PORT4=${REDIS_PORT4}
        - REDIS_HOST5=${REDIS_HOST5}
        - REDIS_PORT5=${REDIS_PORT5}
        - REDIS_HOST6=${REDIS_HOST6}
        - REDIS_PORT6=${REDIS_PORT6}
        - S3_ENDPOINT=${S3_ENDPOINT}
        - S3_REGION=${S3_REGION}
        - S3_BUCKET=${S3_BUCKET}
        - S3_ACCESS_KEY=${S3_ACCESS_KEY}
        - S3_SECRET_KEY=${S3_SECRET_KEY}
        - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE}
        - LOG_DIRECTORY=/app/logs
        - LOG_DAYS_TO_KEEP=${LOG_DAYS_TO_KEEP:-3d}
        - LOG_FILE_LEVEL=${LOG_FILE_LEVEL:-verbose}
        - LOG_CONSOLE_LEVEL=${LOG_CONSOLE_LEVEL:-info}
    logging: { options: { max-size: '10m', max-file: '3' } }
    extra_hosts: ['host.docker.internal:host-gateway']
    restart: unless-stopped
    healthcheck:
        retries: 5
        start_period: 10s
        interval: 10s
        timeout: 5s
        test: 'curl -fsS http://localhost:3000/health'

services:
    app:
        <<: *app-base
        build: { context: ../../../, dockerfile: apis/mono/Dockerfile }
        image: nest-mono
        deploy:
            replicas: ${REPLICAS:-4}

    nginx:
        image: nginx:alpine
        container_name: mono-nginx
        ports: ['${LISTEN_PORT:-3000}:80']
        volumes: ['./nginx.conf:/etc/nginx/nginx.conf:ro']
        depends_on:
            app: { condition: service_healthy }
        restart: unless-stopped
