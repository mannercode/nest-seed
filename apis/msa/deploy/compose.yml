x-app-base: &app-base
    env_file:
        - .env
    environment:
        - NODE_ENV=production
        - MONGO_REPLICA_SET
        - MONGO_USERNAME
        - MONGO_PASSWORD
        - MONGO_DATABASE
        - MONGO_HOST1
        - MONGO_PORT1
        - MONGO_HOST2
        - MONGO_PORT2
        - MONGO_HOST3
        - MONGO_PORT3
        - REDIS_HOST1
        - REDIS_PORT1
        - REDIS_HOST2
        - REDIS_PORT2
        - REDIS_HOST3
        - REDIS_PORT3
        - REDIS_HOST4
        - REDIS_PORT4
        - REDIS_HOST5
        - REDIS_PORT5
        - REDIS_HOST6
        - REDIS_PORT6
        - S3_ENDPOINT
        - S3_REGION
        - S3_BUCKET
        - S3_ACCESS_KEY
        - S3_SECRET_KEY
        - S3_FORCE_PATH_STYLE
        - NATS_HOST1
        - NATS_PORT1
        - NATS_HOST2
        - NATS_PORT2
        - NATS_HOST3
        - NATS_PORT3
        - TEMPORAL_HOST
        - TEMPORAL_PORT
        - TEMPORAL_NAMESPACE
    logging: { options: { max-size: '1m', max-file: '1' } }
    extra_hosts: ['host.docker.internal:host-gateway']
    healthcheck:
        {
            retries: 5,
            start_period: 10s,
            interval: 3s,
            timeout: 3s,
            test: 'curl -fsS http://localhost:$HTTP_PORT/health'
        }

services:
    kong:
        image: kong:3.7
        container_name: kong
        environment:
            KONG_DATABASE: 'off'
            KONG_DECLARATIVE_CONFIG: /kong/kong.yml
            KONG_PROXY_LISTEN: '0.0.0.0:${HTTP_PORT}'
            KONG_ADMIN_LISTEN: '0.0.0.0:8001'
            KONG_PROXY_ACCESS_LOG: /dev/stdout
            KONG_ADMIN_ACCESS_LOG: /dev/stdout
            KONG_PROXY_ERROR_LOG: /dev/stderr
            KONG_ADMIN_ERROR_LOG: /dev/stderr
        volumes:
            - ./kong/kong.yml:/kong/kong.yml:ro
        ports:
            - '${HTTP_PORT}:${HTTP_PORT}'
        depends_on:
            applications: { condition: service_healthy }
            cores: { condition: service_healthy }
            infrastructures: { condition: service_healthy }
        healthcheck:
            test: ['CMD', 'kong', 'health']
            retries: 5
            start_period: 10s
            interval: 3s
            timeout: 3s
        logging: { options: { max-size: '1m', max-file: '1' } }
        extra_hosts: ['host.docker.internal:host-gateway']

    applications:
        <<: *app-base
        build:
            {
                context: ../../..,
                dockerfile: apis/msa/Dockerfile,
                args: { TARGET_APP: applications }
            }
        image: applications
        container_name: applications

    cores:
        <<: *app-base
        build: { context: ../../.., dockerfile: apis/msa/Dockerfile, args: { TARGET_APP: cores } }
        image: cores
        container_name: cores

    infrastructures:
        <<: *app-base
        build:
            {
                context: ../../..,
                dockerfile: apis/msa/Dockerfile,
                args: { TARGET_APP: infrastructures }
            }
        image: infrastructures
        container_name: infrastructures

    api-setup:
        image: docker:cli
        container_name: api-setup
        depends_on:
            kong: { condition: service_healthy }
            applications: { condition: service_healthy }
            cores: { condition: service_healthy }
            infrastructures: { condition: service_healthy }
